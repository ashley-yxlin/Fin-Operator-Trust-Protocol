<script>
const PAGES = {"tour": "<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>Start Here — A guided tour for Sarah<\/title>\n<link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n<link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin>\n<link href=\"https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,500;6..72,600&display=swap\" rel=\"stylesheet\">\n<style>\n  :root{\n    --bg:#fbfcfd; --panel:#ffffff; --panel-2:#f3f5f7;\n    --ink:#161a1f; --text:#363b43; --muted:#646b75; --faint:#969ca6;\n    --line:#e2e6eb; --line-2:#edf0f3;\n    --orange:#ff5c28; --coral:#ff8a5b; --orange-soft:#fdeee6; --orange-line:#f6cdb8;\n    --grad:linear-gradient(135deg,#ff5c28,#ff8a5b);\n    --red:#cf4848; --amber:#a9761c; --teal:#1f93ad; --green:#3f9e6a; --violet:#6d5bd0;\n    --s1:#ff7a45; --s2:#1f93ad; --s3:#3f9e6a; --s4:#6d5bd0;\n    --serif:\"Newsreader\",\"Iowan Old Style\",\"Palatino Linotype\",Palatino,Georgia,\"Times New Roman\",serif;\n    --radius:16px;\n  }\n  *{box-sizing:border-box;margin:0;padding:0}\n  body{font-family:-apple-system,BlinkMacSystemFont,\"Segoe UI\",Inter,Roboto,Helvetica,Arial,sans-serif;\n    background:var(--bg);color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased}\n  .wrap{max-width:880px;margin:0 auto;padding:56px 28px 80px}\n\n  /* hero */\n  .kicker{display:inline-flex;align-items:center;gap:8px;font-size:12px;font-weight:600;color:#c2521f;\n    background:var(--orange-soft);border:1px solid var(--orange-line);padding:6px 13px;border-radius:999px;margin-bottom:20px}\n  .kicker .sdot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 0 3px rgba(63,158,106,.15)}\n  h1{font-family:var(--serif);font-size:34px;font-weight:600;color:var(--ink);letter-spacing:-.01em;line-height:1.2;margin-bottom:14px}\n  .intro{font-size:15.5px;color:var(--text);max-width:660px}\n  .intro b{color:var(--ink)}\n  .tenet{margin-top:16px;font-family:var(--serif);font-style:italic;font-size:17px;color:var(--muted)}\n\n  /* rhythm strip */\n  .rhythm{display:flex;gap:10px;flex-wrap:wrap;margin:30px 0 8px;padding:16px 18px;background:var(--panel);\n    border:1px solid var(--line);border-radius:var(--radius);box-shadow:0 1px 2px rgba(27,24,19,.03)}\n  .rhythm .step{display:flex;align-items:center;gap:9px;font-size:12.5px;color:var(--muted)}\n  .rhythm .step b{color:var(--ink)}\n  .rhythm .arr{color:var(--faint)}\n\n  .sec{font-size:12px;letter-spacing:.13em;text-transform:uppercase;color:var(--faint);font-weight:700;margin:38px 0 14px}\n\n  /* cards */\n  .card{display:block;text-decoration:none;color:inherit;background:var(--panel);border:1px solid var(--line);\n    border-radius:var(--radius);padding:24px 26px;margin-bottom:16px;box-shadow:0 1px 2px rgba(27,24,19,.03);transition:.15s}\n  .card:hover{border-color:var(--orange-line);box-shadow:0 4px 18px rgba(27,24,19,.07);transform:translateY(-1px)}\n  .chead{display:flex;align-items:center;gap:11px;margin-bottom:4px}\n  .cdot{width:9px;height:9px;border-radius:50%;flex-shrink:0}\n  .cname{font-family:var(--serif);font-size:20px;font-weight:600;color:var(--ink)}\n  .cad{margin-left:auto;font-size:11px;font-weight:600;color:var(--muted);background:var(--panel-2);\n    border:1px solid var(--line);padding:3px 10px;border-radius:999px}\n  .cwhat{font-size:14px;color:var(--text);margin:8px 0 16px}\n  .cwhat b{color:var(--ink)}\n  .rows{display:grid;grid-template-columns:1fr 1fr;gap:12px 26px}\n  @media(max-width:620px){.rows{grid-template-columns:1fr}}\n  .r .k{font-size:11px;letter-spacing:.07em;text-transform:uppercase;color:var(--faint);font-weight:700;margin-bottom:2px}\n  .r .v{font-size:13px;color:var(--text)}\n  .r.no .k{color:#bd8a8a}\n  .r.no .v{color:var(--muted)}\n  .open{margin-top:15px;font-size:12.5px;font-weight:600;color:#c2521f}\n  .open .ar{transition:.15s}\n  .card:hover .open .ar{margin-left:4px}\n\n  .close{margin-top:34px;padding:22px 24px;background:var(--panel-2);border:1px dashed var(--line);border-radius:var(--radius);\n    font-size:14px;color:var(--text)}\n  .close b{color:var(--ink)}\n  .foot{margin-top:30px;font-size:11.5px;color:var(--faint);text-align:center}\n<\/style>\n<\/head>\n<body>\n<div class=\"wrap\">\n\n  <div class=\"kicker\"><span class=\"sdot\"><\/span>Trust Protocol · a quick tour<\/div>\n  <h1>Hi Sarah. Here's how you'll actually use this.<\/h1>\n  <p class=\"intro\">\n    Your team runs your customer AI with <b>Fin Operator<\/b>. Operator is powerful — it tunes Fin, rewrites knowledge,\n    ships fixes on its own. This layer sits on top of it for one reason: so you can <b>trust what Operator is doing,\n    instead of assuming it<\/b>. It never touches your end customers, and it never decides for you — it surfaces the\n    evidence and executes the rules <b>you<\/b> set.\n  <\/p>\n  <div class=\"tenet\">\"Trust measured, not assumed.\"<\/div>\n\n  <div class=\"rhythm\">\n    <div class=\"step\"><b>Once<\/b> · set it up<\/div><span class=\"arr\">→<\/span>\n    <div class=\"step\"><b>Each morning<\/b> · who's at risk<\/div><span class=\"arr\">→<\/span>\n    <div class=\"step\"><b>In the moment<\/b> · review a change<\/div><span class=\"arr\">→<\/span>\n    <div class=\"step\"><b>Each week<\/b> · is it drifting?<\/div>\n  <\/div>\n\n  <div class=\"sec\">Configure · once<\/div>\n\n  <a class=\"card\" href=\"Step1_Setup_v2.html\">\n    <div class=\"chead\"><span class=\"cdot\" style=\"background:#a7acb4\"><\/span><span class=\"cname\">Setup &amp; Configuration<\/span><span class=\"cad\">one-time<\/span><\/div>\n    <div class=\"cwhat\">You set the <b>one number that governs everything<\/b>: your confidence threshold — the line below which Operator's proposed changes must stop and come to you.<\/div>\n    <div class=\"rows\">\n      <div class=\"r\"><div class=\"k\">When you open it<\/div><div class=\"v\">Once, when you switch it on (plus the rare revisit).<\/div><\/div>\n      <div class=\"r\"><div class=\"k\">What you do<\/div><div class=\"v\">Set the threshold, set what counts as \"too many accounts\" (blast radius), pick who issues route to internally.<\/div><\/div>\n      <div class=\"r\"><div class=\"k\">Why it matters<\/div><div class=\"v\">That threshold isn't a quality filter — it's the trust boundary you've decided to enforce.<\/div><\/div>\n      <div class=\"r no\"><div class=\"k\">It won't<\/div><div class=\"v\">Pretend to detect drift before it's learned your normal — that waits ~3 days (the blast-radius gate works day one, and it pings you when the rest is ready). And no path ever reaches an end customer.<\/div><\/div>\n    <\/div>\n    <div class=\"open\">Open this screen <span class=\"ar\">→<\/span><\/div>\n  <\/a>\n\n  <div class=\"sec\">Your daily &amp; in-the-moment surfaces<\/div>\n\n  <a class=\"card\" href=\"Step2_AtRisk_v2.html\">\n    <div class=\"chead\"><span class=\"cdot\" style=\"background:var(--s1)\"><\/span><span class=\"cname\">At-Risk Interactions<\/span><span class=\"cad\">daily<\/span><\/div>\n    <div class=\"cwhat\">Your <b>morning list<\/b>: which <b>Fin–customer interactions<\/b> drifted toward risk in the last 24 hours.<\/div>\n    <div class=\"rows\">\n      <div class=\"r\"><div class=\"k\">When you open it<\/div><div class=\"v\">First thing each morning.<\/div><\/div>\n      <div class=\"r\"><div class=\"k\">What you do<\/div><div class=\"v\">Scan (sorted by Reopen Rate — the strongest signal). On each card, send to Operator's RCA pipeline or escalate to your CSM Lead.<\/div><\/div>\n      <div class=\"r\"><div class=\"k\">Why it matters<\/div><div class=\"v\">Catches the 5 high-value accounts a \"90% overall\" number would hide.<\/div><\/div>\n      <div class=\"r no\"><div class=\"k\">It won't<\/div><div class=\"v\">Let you message the customer — every action is internal. It flags after the fact, it doesn't intercept a live chat.<\/div><\/div>\n    <\/div>\n    <div class=\"open\">Open this screen <span class=\"ar\">→<\/span><\/div>\n  <\/a>\n\n  <a class=\"card\" href=\"Step3_ProposalReview_v2.html\">\n    <div class=\"chead\"><span class=\"cdot\" style=\"background:var(--s2)\"><\/span><span class=\"cname\">Proposal Review<\/span><span class=\"cad\">in-flow<\/span><\/div>\n    <div class=\"cwhat\">When Operator wants to <b>change Fin<\/b> (a new article, a new rule), you see the change <b>before it ships<\/b> — the two numbers it's standing on, the evidence behind it — and you <b>decide right there<\/b>: approve, reject, or escalate.<\/div>\n    <div class=\"rows\">\n      <div class=\"r\"><div class=\"k\">When you open it<\/div><div class=\"v\">When a change is proposed — you get notified.<\/div><\/div>\n      <div class=\"r\"><div class=\"k\">What you do<\/div><div class=\"v\">Read the two signals (Confidence + Blast Radius), see why your rules routed it, check the Operator's track record — then act. Buttons are sized by consequence, so approving a change that touches 312 accounts is the biggest, most deliberate one.<\/div><\/div>\n      <div class=\"r\"><div class=\"k\">Why it matters<\/div><div class=\"v\">You see the reasons before the verdict — trust is measured, never assumed — and every decision feeds the weekly calibration record.<\/div><\/div>\n      <div class=\"r no\"><div class=\"k\">It won't<\/div><div class=\"v\">Say \"AI recommends approve\" or steer you toward an option. The routing is just your own threshold executing; reject auto-sends structured feedback back to Operator.<\/div><\/div>\n    <\/div>\n    <div class=\"open\">Open this screen <span class=\"ar\">→<\/span><\/div>\n  <\/a>\n\n  <div class=\"sec\">Step back · weekly &amp; on the record<\/div>\n\n  <a class=\"card\" href=\"Step5_Calibration_v2.html\">\n    <div class=\"chead\"><span class=\"cdot\" style=\"background:var(--s3)\"><\/span><span class=\"cname\">Calibration Status<\/span><span class=\"cad\">weekly<\/span><\/div>\n    <div class=\"cwhat\">The <b>weekly view<\/b>: is Operator's judgment getting better, or drifting worse, over time?<\/div>\n    <div class=\"rows\">\n      <div class=\"r\"><div class=\"k\">When you open it<\/div><div class=\"v\">Weekly — and before your monthly CX review.<\/div><\/div>\n      <div class=\"r\"><div class=\"k\">What you do<\/div><div class=\"v\">Read three trends, see which topics are drifting and may need a manual audit.<\/div><\/div>\n      <div class=\"r\"><div class=\"k\">Why it matters<\/div><div class=\"v\">If a metric trends up but the real downstream signal doesn't, it flags that <b>the metric itself<\/b> might be wrong — it doubts its own measure.<\/div><\/div>\n      <div class=\"r no\"><div class=\"k\">It won't<\/div><div class=\"v\">Be a firefighting screen. This is for slow trends, not today's actions.<\/div><\/div>\n    <\/div>\n    <div class=\"open\">Open this screen <span class=\"ar\">→<\/span><\/div>\n  <\/a>\n\n  <a class=\"card\" href=\"S4_PolicyLog_v2.html\">\n    <div class=\"chead\"><span class=\"cdot\" style=\"background:var(--s4)\"><\/span><span class=\"cname\">Policy Execution Log<\/span><span class=\"cad\">post-event<\/span><\/div>\n    <div class=\"cwhat\">The <b>running record<\/b> of every automatic action the system took on your behalf — tightening a threshold, sending feedback back to Operator.<\/div>\n    <div class=\"rows\">\n      <div class=\"r\"><div class=\"k\">When you open it<\/div><div class=\"v\">Whenever you want to see what fired, and why.<\/div><\/div>\n      <div class=\"r\"><div class=\"k\">What you do<\/div><div class=\"v\">Read it — it's a ledger, not a control panel. Each line shows the trigger and the pre-set action.<\/div><\/div>\n      <div class=\"r\"><div class=\"k\">Why it matters<\/div><div class=\"v\">It's the proof that nothing here is an AI guessing — every action traces back to a rule you set.<\/div><\/div>\n      <div class=\"r no\"><div class=\"k\">It won't<\/div><div class=\"v\">Let you change an action here. The actions already ran, deterministically.<\/div><\/div>\n    <\/div>\n    <div class=\"open\">Open this screen <span class=\"ar\">→<\/span><\/div>\n  <\/a>\n\n  <div class=\"close\">\n    <b>One thing to notice:<\/b> there's no single \"dashboard\" running the show. The surfaces check each other —\n    the daily list audits Operator's coverage, the weekly trend audits the in-flow decisions, and so on. That's the\n    point: trust isn't held by one screen, it's <b>composed across them<\/b>.\n  <\/div>\n\n  <div class=\"foot\">Stacked Agent Trust Protocol · guided tour · open any card to see the screen<\/div>\n\n<\/div>\n<script>(function(){var TITLE={\"Setup & Config\":\"setup\",\"At-Risk Interactions\":\"atrisk\",\"Proposal Review\":\"proposal\",\"Calibration Status\":\"calibration\",\"Policy Execution Log\":\"policylog\"};var FILE={\"Step1_Setup_v2.html\":\"setup\",\"Step2_AtRisk_v2.html\":\"atrisk\",\"Step3_ProposalReview_v2.html\":\"proposal\",\"Step5_Calibration_v2.html\":\"calibration\",\"S4_PolicyLog_v2.html\":\"policylog\",\"00_Start_Here_Tour.html\":\"tour\"};document.addEventListener('click',function(e){var a=e.target.closest&&e.target.closest('a');if(!a)return;var k=TITLE[(a.getAttribute('title')||'').trim()]||FILE[a.getAttribute('href')];if(k){e.preventDefault();try{parent.postMessage({satpGo:k},'*');}catch(_){}}},true);})();<\/script><\/body>\n<\/html>\n", "setup": "<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>Step 1 · Setup & Configuration — Stacked Agent Trust Protocol (Fin Operator style)<\/title>\n<link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n<link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin>\n<link href=\"https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,500;6..72,600&display=swap\" rel=\"stylesheet\">\n<style>\n  :root{\n    --bg:#fbfcfd; --panel:#ffffff; --panel-2:#f3f5f7; --raised:#eaedf1;\n    --ink:#161a1f; --text:#363b43; --muted:#646b75; --faint:#969ca6;\n    --line:#e2e6eb; --line-2:#edf0f3;\n    --orange:#ff5c28; --coral:#ff8a5b; --orange-soft:#fdeee6; --orange-line:#f6cdb8;\n    --grad:linear-gradient(135deg,#ff5c28,#ff8a5b);\n    --black:#1b1813;\n    --red:#cf4848; --red-soft:#fbeceb; --red-line:#f1cdca;\n    --amber:#a9761c; --amber-soft:#fbf3e3; --amber-line:#eccf9b;\n    --teal:#1f93ad; --green:#3f9e6a; --violet:#6d5bd0;\n    --s1:#ff7a45; --s2:#1f93ad; --s3:#3f9e6a; --s4:#6d5bd0;\n    --serif:\"Newsreader\",\"Iowan Old Style\",\"Palatino Linotype\",Palatino,Georgia,\"Times New Roman\",serif;\n    --radius:14px;\n  }\n  *{box-sizing:border-box;margin:0;padding:0}\n  body{font-family:-apple-system,BlinkMacSystemFont,\"Segoe UI\",Inter,Roboto,Helvetica,Arial,sans-serif;\n    background:var(--bg);color:var(--text);line-height:1.5;-webkit-font-smoothing:antialiased}\n  .app{display:flex;height:100vh;overflow:hidden}\n\n  .side{width:256px;flex-shrink:0;background:var(--panel-2);border-right:1px solid var(--line);\n    display:flex;flex-direction:column;padding:22px 0;position:relative;transition:width .18s;overflow-y:auto}\n  .side:before{content:\"\";position:absolute;left:0;top:0;bottom:0;width:3px;\n    background:linear-gradient(180deg,#6d5bd0,#ff8a5b)}\n  .brand{padding:2px 24px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:11px}\n  .brand .mark{width:28px;height:28px;flex-shrink:0;display:flex;align-items:center;justify-content:center;line-height:0}\n  .brand .btxt{min-width:0}\n  .brand .name{font-family:var(--serif);font-size:16px;font-weight:600;letter-spacing:.01em;color:var(--ink)}\n  .brand .sub{font-size:11px;color:var(--faint);margin-top:4px}\n  .collapse-btn{margin-left:auto;flex-shrink:0;background:none;border:none;border-radius:7px;cursor:pointer;padding:4px;line-height:0;transition:.15s}\n  .collapse-btn:hover{background:var(--panel)}\n  .collapse-btn .cicon{width:18px;height:18px;display:block;opacity:.62;transition:opacity .15s}\n  .collapse-btn:hover .cicon{opacity:1}\n  .nav{padding:16px 12px;display:flex;flex-direction:column;gap:2px}\n  .nav .lbl{font-size:10px;letter-spacing:.12em;color:var(--faint);padding:8px 12px 5px;text-transform:uppercase}\n  .nav a{display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:9px;color:var(--muted);\n    text-decoration:none;font-size:13px;transition:.15s}\n  .nav a:hover{background:#fff;color:var(--text)}\n  .nav a.active{background:#fff;color:var(--ink);font-weight:600;box-shadow:0 1px 2px rgba(27,24,19,.05),inset 0 0 0 1px var(--line)}\n  .nav a .nico{width:18px;height:18px;flex-shrink:0;display:block}\n  .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}\n  .side .foot{margin-top:auto;padding:16px 24px;border-top:1px solid var(--line);font-size:11px;color:var(--faint);display:flex;align-items:center;gap:10px}\n  .side .foot b{color:var(--text)}\n  .avatar{width:28px;height:28px;border-radius:50%;flex-shrink:0;position:relative;background:linear-gradient(135deg,#6d5bd0,#ff8a5b);display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700;letter-spacing:.02em}\n  .avatar .presence{position:absolute;right:-1px;bottom:-1px;width:9px;height:9px;border-radius:50%;background:var(--green);border:2px solid var(--panel-2)}\n  .status{display:flex;align-items:center;gap:7px;padding:12px 24px 0;font-size:11px;color:var(--muted)}\n  .status .sdot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 0 3px rgba(63,158,106,.15)}\n  .tenet{margin-top:8px;font-size:11px;color:var(--faint);font-style:italic}\n\n  /* collapsed icon rail */\n  .side.collapsed{width:64px}\n  .side.collapsed .brand{flex-direction:column;align-items:center;gap:12px;padding:16px 0;justify-content:center;position:static}\n  .side.collapsed .brand .btxt{display:none}\n  .side.collapsed .collapse-btn{position:static;margin:0}\n  .side.collapsed .nav{padding:16px 8px}\n  .side.collapsed .nav .lbl{display:none}\n  .side.collapsed .nav a{justify-content:center;gap:0;padding:9px 0}\n  .side.collapsed .nav a .ntxt{display:none}\n  .side.collapsed .nav a .dot{display:none}\n  .side.collapsed .status{padding:12px 0 0;justify-content:center}\n  .side.collapsed .status .stxt{display:none}\n  .side.collapsed .foot{justify-content:center;padding:16px 8px}\n  .side.collapsed .foot .ftxt{display:none}\n\n  .main{flex:1;overflow-y:auto;padding:30px 40px 0;max-width:1080px;display:flex;flex-direction:column;min-height:100vh}\n  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}\n  .crumb{font-size:12px;color:var(--muted)} .crumb b{color:var(--text)}\n\n  .badge{display:inline-flex;align-items:center;gap:8px;font-size:12px;font-weight:600;\n    padding:6px 13px;border-radius:999px;background:var(--amber-soft);color:var(--amber);border:1px solid var(--amber-line)}\n  .badge .pulse{width:7px;height:7px;border-radius:50%;background:var(--amber);\n    box-shadow:0 0 0 0 rgba(169,118,28,.5);animation:p 1.8s infinite}\n  @keyframes p{0%{box-shadow:0 0 0 0 rgba(169,118,28,.45)}70%{box-shadow:0 0 0 7px rgba(169,118,28,0)}100%{box-shadow:0 0 0 0 rgba(169,118,28,0)}}\n\n  h1{font-family:var(--serif);font-size:27px;font-weight:600;color:var(--ink);letter-spacing:-.01em;line-height:1.25;margin-bottom:7px}\n  .lead{font-size:13.5px;color:var(--muted);margin-bottom:22px}.lead b{color:var(--text)}\n\n  /* HERO: confidence threshold = single protagonist */\n  .hero{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);\n    padding:30px 32px;margin-bottom:18px;box-shadow:0 1px 2px rgba(27,24,19,.03)}\n  .hero .tag{font-size:11px;font-weight:700;letter-spacing:.1em;color:#c2521f;text-transform:uppercase}\n  .hero .htitle{font-family:var(--serif);font-size:18px;font-weight:600;color:var(--ink);margin:8px 0 2px}\n  .threshrow{display:flex;align-items:flex-end;gap:18px;mar ><span class=\"ntxt\">Setup &amp; Config<\/span><\/a>\n      <div class=\"lbl\">Surfaces<\/div>\n      <a href=\"#\" title=\"At-Risk Interactions\"><svg class=\"nico\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 4 L21 19 L3 19 Z\"/><line x1=\"12\" y1=\"10\" x2=\"12\" y2=\"14\"/><circle cx=\"12\" cy=\"16.7\" r=\".7\" fill=\"currentColor\" stroke=\"none\"/><\/svg><span class=\"ntxt\">At-Risk Interactions<\/span><\/a>\n      <a href=\"#\" title=\"Proposal Review\"><svg class=\"nico\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 3l7 3v5c0 5-3.4 8-7 9-3.6-1-7-4-7-9V6z\"/><path d=\"M9 12l2 2 4-4\"/><\/svg><span class=\"ntxt\">Proposal Review<\/span><\/a>\n      <a href=\"#\" title=\"Calibration Status\"><svg class=\"nico\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"3 20 21 20\"/><polyline points=\"4 16 9 11 13 14 20 6\"/><\/svg><span class=\"ntxt\">Calibration Status<\/span><\/a>\n      <a href=\"#\" title=\"Policy Execution Log\"><svg class=\"nico\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"4.5\" cy=\"7\" r=\"1\" fill=\"currentColor\" stroke=\"none\"/><line x1=\"8\" y1=\"7\" x2=\"20\" y2=\"7\"/><circle cx=\"4.5\" cy=\"12\" r=\"1\" fill=\"currentColor\" stroke=\"none\"/><line x1=\"8\" y1=\"12\" x2=\"20\" y2=\"12\"/><circle cx=\"4.5\" cy=\"17\" r=\"1\" fill=\"currentColor\" stroke=\"none\"/><line x1=\"8\" y1=\"17\" x2=\"20\" y2=\"17\"/><\/svg><span class=\"ntxt\">Policy Execution Log<\/span><\/a>\n    <\/nav>\n    <div class=\"foot\"><span class=\"avatar\">SC<i class=\"presence\"><\/i><\/span><span class=\"ftxt\">Logged in as<br><b>Sarah Chen · Director<\/b><div class=\"tenet\">Trust measured, not assumed<\/div><\/span><\/div>\n  <\/aside>\n\n  <main class=\"main\">\n    <div class=\"topbar\">\n      <div class=\"crumb\"><b>Setup &amp; Configuration<\/b> &nbsp;·&nbsp; one-time<\/div>\n      <span class=\"badge\"><span class=\"pulse\"><\/span>Calibrating — blast-radius gate live, drift detection in ~3 days<\/span>\n    <\/div>\n\n    <h1>Set the boundary this protocol will enforce<\/h1>\n    <p class=\"lead\">You are not configuring features. You are deciding where trust must be re-measured across the agent stack.<\/p>\n\n    <!-- HERO — S1 at-risk detection sensitivity (primary) -->\n    <section class=\"hero\">\n      <div class=\"tag\">Primary · At-Risk detection sensitivity<\/div>\n      <div class=\"htitle\">How hard S1 looks for silent failure<\/div>\n      <div class=\"drives\"><span class=\"dd\" style=\"background:var(--s1)\"><\/span>Drives · At-Risk Interactions (S1)<\/div>\n      <div class=\"threshrow\">\n        <div class=\"bignum\"><span id=\"sPct\">1.7<\/span><span class=\"of\">% flagged<\/span><\/div>\n        <div class=\"threshmeta\">\n          <div class=\"k\">How aggressively Fin–customer interactions get flagged as drifting toward <b>silent churn<\/b>.<\/div>\n          <div class=\"k\">Too loose misses real at-risk; too tight floods your reviewers — there is a sweet spot.<\/div>\n        <\/div>\n      <\/div>\n      <div class=\"slwrap\">\n        <input type=\"range\" id=\"sens\" min=\"5\" max=\"80\" value=\"17\" style=\"--fill:16%\">\n        <div class=\"ticks\"><span>0.5% · loose<\/span><span>~1.7% · matched to capacity<\/span><span>8% · sensitive<\/span><\/div>\n        <div class=\"consq\">\n          <div class=\"ci\"><span class=\"cv\" id=\"sFlag\">20<\/span><span>flags / day<\/span><\/div>\n          <div class=\"ci\"><span class=\"cv\" id=\"sCap\">20<\/span><span>your team reviews / day<\/span><\/div>\n          <div class=\"ci\"><span class=\"cv riskmd\" id=\"sHandled\">281<\/span><span>of 400 at-risk handled / qtr<\/span><\/div>\n          <div class=\"ci\"><span class=\"cv riskhi\" id=\"sMissed\">119<\/span><span>stay invisible / qtr<\/span><\/div>\n        <\/div>\n        <div class=\"dollar\">\n          <input type=\"number\" class=\"num\" id=\"arr\" placeholder=\"ARR $\" min=\"0\">\n          <span class=\"doff\" id=\"sDollarOff\">＋ add avg ARR / high-value account to estimate $ saved (optional)<\/span>\n          <span class=\"don\" id=\"sDollarOn\" style=\"display:none\"><b id=\"sDollar\">—<\/b> est. saved / qtr <span class=\"dnote\">· estimate, sharpens as save-rate calibrates<\/span><\/span>\n        <\/div>\n      <\/div>\n      <div class=\"suggest\">\n        <span>Suggested start <b>~1.7%<\/b> — matched to a typical reviewer's daily capacity.<\/span>\n        <button class=\"applysug\" id=\"applySug\">Use suggested<\/button>\n      <\/div>\n      <div class=\"frame\">You don't have to get this perfect on day one — S3 Calibration tunes it from real performance, and the $ estimate sharpens as the protocol learns your accounts.<\/div>\n      <div class=\"why\">\n        This dial decides how much of the <b>silent failure the aggregate hides<\/b> you actually surface. Set it blind and you either miss real at-risk accounts or bury your reviewers — <b>both<\/b> lose accounts you could have saved.\n      <\/div>\n      <div class=\"warn\" id=\"sWarn\">\n        <span class=\"ico\">!<\/span>\n        <div><b id=\"sWarnN\">40<\/b> flags/day beyond your review capacity — extra flags pile up unreviewed, so turning sensitivity up from here <b>saves fewer accounts, not more<\/b>.<\/div>\n      <\/div>\n      <details class=\"signals\">\n        <summary>Fine-tune the three detection signals<\/summary>\n        <div class=\"row2\"><span class=\"lab\">Reopen Rate<span class=\"primflag\">primary<\/span><\/span><span class=\"meta\">flag at ≥ <input type=\"number\" class=\"num\" id=\"reopenTh\" value=\"15\" min=\"1\">%<\/span><\/div>\n        <div class=\"row2\"><span class=\"lab\">Follow-up Entropy<\/span><span class=\"meta\">flag at ≥ <input type=\"number\" class=\"num\" id=\"entropyTh\" value=\"0.60\" min=\"0\" step=\"0.05\"><\/span><\/div>\n        <div class=\"row2\"><span class=\"lab\">Drop-off<\/span><span class=\"meta\">flag at ≥ <input type=\"number\" class=\"num\" id=\"dropoffTh\" value=\"5\" min=\"1\">% exit<\/span><\/div>\n      <\/details>\n    <\/section>\n\n    <!-- baseline -->\n    <section class=\"baseline\">\n      <div class=\"row\">\n        <h3>Calibration baseline<\/h3>\n        <span class=\"pct\">70,150 / 115,000 conversations · 61%<\/span>\n      <\/div>\n      <div class=\"bar\"><i><\/i><\/div>\n      <div class=\"sub\">Reading Apr 14 → May 14 · est. ~3 days remaining<\/div>\n      <div class=\"cs\">\n        <div class=\"csrow on\"><span class=\"csic\">✓<\/span><div><b>Live now<\/b> — the blast-radius gate. Any change touching &gt;<span id=\"liveHigh\">50<\/span> accounts is already held for Deep Review. This rule is deterministic and needs no history.<\/div><\/div>\n        <div class=\"csrow wait\"><span class=\"csic\">◷<\/span><div><b>In ~3 days<\/b> — confidence scoring &amp; drift detection switch on. These need the baseline to learn your normal before they can be trusted.<\/div><\/div>\n      <\/div>\n      <label class=\"notify\"><input type=\"checkbox\" id=\"notify\" checked><span>Email + Teams me the moment the baseline completes — so I don't have to remember to check back.<\/span><\/label>\n    <\/section>\n\n    <!-- secondary editable — each card tagged with the surface it drives -->\n    <p class=\"lead\" style=\"margin:4px 0 14px;font-size:12.5px\">Each setting below is tagged with the surface it drives — so you always know <b>which function<\/b> a threshold controls.<\/p>\n    <div class=\"secgrid\">\n      <!-- Confidence threshold → S2 (demoted from hero) -->\n      <div class=\"card\">\n        <div class=\"drives\"><span class=\"dd\" style=\"background:var(--s2)\"><\/span>Drives · Proposal Review + Gate (S2)<\/div>\n        <h4>Confidence threshold<\/h4>\n        <div class=\"threshrow\" style=\"margin:2px 0 8px\"><div class=\"bignum\" style=\"font-size:40px;line-height:1\" id=\"thNum\">0.71<span class=\"of\" style=\"font-size:16px\"> / 1.00<\/span><\/div><\/div>\n        <input type=\"range\" id=\"th\" min=\"40\" max=\"99\" value=\"71\" style=\"--fill:53%\">\n        <div class=\"ticks\"><span>0.40 · permissive<\/span><span>0.71<\/span><span>0.99 · strict<\/span><\/div>\n        <div class=\"forcedeep\">Proposals scoring <b>≥ threshold<\/b> auto-proceed; below it — or HIGH blast radius — route to manual review.<\/div>\n        <div class=\"warn\" id=\"warn\"><span class=\"ico\">!<\/span><div>At this level almost every proposal trips manual review — a <b>flood of first-week alerts<\/b> that get ignored.<\/div><\/div>\n      <\/div>\n\n      <!-- Blast radius override → S2 -->\n      <div class=\"card\">\n        <div class=\"drives\"><span class=\"dd\" style=\"background:var(--s2)\"><\/span>Drives · Proposal Review + Gate (S2)<\/div>\n        <h4>When scope overrides confidence<\/h4>\n        <div class=\"row2\"><span class=\"lab\"><span class=\"pill low\">LOW<\/span> auto-eligible<\/span><span class=\"meta\">≤ <input type=\"number\" class=\"num\" id=\"lowMax\" value=\"5\" min=\"1\"> accounts<\/span><\/div>\n        <div class=\"row2\"><span class=\"lab\"><span class=\"pill med\">MED<\/span> quick review<\/span><span class=\"meta\"><span id=\"medRange\">6 – 50<\/span> · up to <input type=\"number\" class=\"num\" id=\"medMax\" value=\"50\" min=\"2\"><\/span><\/div>\n        <div class=\"row2\"><span class=\"lab\"><span class=\"pill high\">HIGH<\/span> deep review<\/span><span class=\"meta\" id=\"highRange\">&gt; 50 accounts<\/span><\/div>\n        <div class=\"forcedeep\">Force Deep Review at:\n          <select class=\"sel\" id=\"forceDeep\">\n            <option value=\"high\" selected>HIGH only<\/option>\n            <option value=\"med\">MED and above<\/option>\n          <\/select>\n        <\/div>\n      <\/div>\n    <\/div>\n\n    <!-- Escalation paths → used by S1 actions + Gate escalations (full width) -->\n    <div class=\"card\" style=\"margin-bottom:18px\">\n      <div class=\"drives\"><span class=\"dd\" style=\"background:var(--s4)\"><\/span>Used by · At-Risk actions (S1) + Gate escalations<\/div>\n      <h4>Where flagged work is routed<\/h4>\n      <div class=\"row2\"><span class=\"lab\">Tier 1 · Operator RCA pipeline<\/span><span class=\"meta\">SLA <input type=\"number\" class=\"num\" id=\"t1sla\" value=\"4\" min=\"1\">h<\/span><\/div>\n      <div class=\"row2\"><span class=\"lab\">Tier 2 · CSM Leads — eligible pool<\/span><span class=\"meta\">SLA <input type=\"number\" class=\"num\" id=\"t2sla\" value=\"2\" min=\"1\">h<\/span><\/div>\n      <div class=\"leadpool\" id=\"leadPool\">\n        <span class=\"lchip\">Marcus Webb<button class=\"lchip-rm\" title=\"remove\">✕<\/button><\/span>\n        <span class=\"lchip\">Dana Lee<button class=\"lchip-rm\" title=\"remove\">✕<\/button><\/span>\n        <span class=\"lchip\">Priya Nair<button class=\"lchip-rm\" title=\"remove\">✕<\/button><\/span>\n      <\/div>\n      <div class=\"leadadd\"><input class=\"tin\" id=\"leadInput\" placeholder=\"Add CSM Lead…\"><button class=\"addlead\" id=\"addLead\">+ Add<\/button><\/div>\n      <div class=\"forcedeep\">Set several eligible leads here · at route time the Director picks which one receives the escalation.<\/div>\n      <div class=\"row2\"><span class=\"lab\">Tier 3 · Incident Review Board<\/span><span class=\"meta\">SLA <input type=\"number\" class=\"num\" id=\"t3sla\" value=\"1\" min=\"1\">h<\/span><\/div>\n      <div class=\"internal\"><span class=\"lk\">⛔<\/span><div>No escalation path reaches end customers. <b>Every route is internal.<\/b><\/div><\/div>\n    <\/div>\n\n    <!-- team roles -->\n    <section class=\"roles\">\n      <div class=\"drives\"><span class=\"dd\" style=\"background:#a7acb4\"><\/span>Applies to · all surfaces<\/div>\n      <h4>Who can see and act<\/h4>\n      <div class=\"sub\">Directors set thresholds &amp; decide at the gate · Approvers can act at the gate · Viewers see surfaces, read-only.<\/div>\n      <div id=\"roleList\">\n        <div class=\"role-row\"><input class=\"tin\" value=\"Sarah Chen\"><select class=\"sel rrole\"><option selected>Director<\/option><option>Approver<\/option><option>Viewer<\/option><\/select><button class=\"rm\" title=\"remove\">✕<\/button><\/div>\n        <div class=\"role-row\"><input class=\"tin\" value=\"Marcus Webb\"><select class=\"sel rrole\"><option>Director<\/option><option selected>Approver<\/option><option>Viewer<\/option><\/select><button class=\"rm\" title=\"remove\">✕<\/button><\/div>\n        <div class=\"role-row\"><input class=\"tin\" value=\"Dana Lee\"><select class=\"sel rrole\"><option>Director<\/option><option>Approver<\/option><option selected>Viewer<\/option><\/select><button class=\"rm\" title=\"remove\">✕<\/button><\/div>\n      <\/div>\n      <button class=\"addrole\" id=\"addRole\">+ Add teammate<\/button>\n    <\/section>\n\n    <!-- sticky save bar -->\n    <div class=\"savebar\">\n      <div class=\"sstate\" id=\"sstate\">Not saved yet<\/div>\n      <button class=\"btn-save\" id=\"saveBtn\">Save configuration<\/button>\n    <\/div>\n  <\/main>\n<\/div>\n\n<script>\n  // collapsible icon sidebar (shared across the 5 prototype pages via satp_nav)\n  (function(){\n    var side=document.getElementById('side'), btn=document.getElementById('collapseBtn');\n    if(!side||!btn) return;\n    function apply(c){ side.classList.toggle('collapsed',c); btn.title=c?'Expand sidebar':'Collapse sidebar'; }\n    var saved; try{saved=localStorage.getItem('satp_nav')}catch(e){}\n    apply(saved==='collapsed');\n    btn.addEventListener('click',function(){\n      var c=!side.classList.contains('collapsed'); apply(c);\n      try{localStorage.setItem('satp_nav',c?'collapsed':'expanded')}catch(e){}\n    });\n  })();\n<\/script>\n<script>\n  const LS='satp_setup_config';\n  const $=id=>document.getElementById(id);\n  const th=$('th'),thNum=$('thNum'),warn=$('warn');\n  const sens=$('sens'),sPct=$('sPct'),sFlag=$('sFlag'),sCap=$('sCap'),sHandled=$('sHandled'),sMissed=$('sMissed');\n  const arr=$('arr'),sDollar=$('sDollar'),sDollarOff=$('sDollarOff'),sDollarOn=$('sDollarOn'),sWarn=$('sWarn'),sWarnN=$('sWarnN'),applySug=$('applySug');\n  const reopenTh=$('reopenTh'),entropyTh=$('entropyTh'),dropoffTh=$('dropoffTh');\n  const lowMax=$('lowMax'),medMax=$('medMax'),forceDeep=$('forceDeep');\n  const medRange=$('medRange'),highRange=$('highRange'),liveHigh=$('liveHigh');\n  const t1sla=$('t1sla'),t2sla=$('t2sla'),t3sla=$('t3sla');\n  const leadPool=$('leadPool'),leadInput=$('leadInput'),addLead=$('addLead');\n  const notify=$('notify'),sstate=$('sstate'),saveBtn=$('saveBtn');\n  const roleList=$('roleList'),addRole=$('addRole');\n\n  function fmtThresh(){\n    const v=(th.value/100).toFixed(2);\n    thNum.innerHTML=v+'<span class=\"of\" style=\"font-size:16px\"> / 1.00<\/span>';\n    th.style.setProperty('--fill',(((th.value-40)/(99-40))*100).toFixed(1)+'%');\n    warn.classList.toggle('show', th.value>=86);\n  }\n  // S1 at-risk detection sensitivity — live consequence preview (mirrors W7_simulation.py)\n  const SENS={INT_DAY:1200, CAP_DAY:20, QD:60, TRUE:400, SAVE:0.45, RMAX:0.95, K:0.012};\n  function previewS1(){\n    const s=sens.value/1000;                       // slider 5..80 -> flag rate 0.5%..8.0%\n    sPct.textContent=(s*100).toFixed(1);\n    sens.style.setProperty('--fill',(((sens.value-5)/(80-5))*100).toFixed(1)+'%');\n    const flagDay=Math.round(SENS.INT_DAY*s);\n    const recall=SENS.RMAX*(1-Math.exp(-s/SENS.K));\n    const flagQtr=SENS.INT_DAY*SENS.QD*s, capQtr=SENS.CAP_DAY*SENS.QD;\n    const coverage=Math.min(1, capQtr/flagQtr);\n    const actioned=Math.round(SENS.TRUE*recall*coverage);\n    sFlag.textContent=flagDay;\n    sCap.textContent=SENS.CAP_DAY;\n    sHandled.textContent=actioned;\n    sMissed.textContent=SENS.TRUE-actioned;\n    const over=flagDay>SENS.CAP_DAY;\n    sWarn.classList.toggle('show', over);\n    if(over) sWarnN.textContent=(flagDay-SENS.CAP_DAY);\n    const arrv=+arr.value||0;\n    if(arrv>0){\n      sDollarOn.style.display=''; sDollarOff.style.display='none';\n      sDollar.textContent='$'+Math.round(actioned*SENS.SAVE*arrv).toLocaleString();\n    } else { sDollarOn.style.display='none'; sDollarOff.style.display=''; }\n  }\n  function fmtBlast(){\n    const lo=+lowMax.value||0, me=+medMax.value||0;\n    medRange.textContent=(lo+1)+' – '+me;\n    highRange.textContent='> '+me+' accounts';\n    liveHigh.textContent=me;\n  }\n  function markDirty(){ sstate.textContent='Unsaved changes'; sstate.className='sstate unsaved'; saveBtn.classList.remove('done','applying'); saveBtn.textContent='Save configuration'; saveBtn.disabled=false; }\n\n  function gather(){\n    return {th:th.value,sens:sens.value,arr:arr.value,reopenTh:reopenTh.value,entropyTh:entropyTh.value,dropoffTh:dropoffTh.value,\n      lowMax:lowMax.value,medMax:medMax.value,forceDeep:forceDeep.value,\n      t1sla:t1sla.value,t2sla:t2sla.value,t3sla:t3sla.value,\n      csmLeads:[...leadPool.querySelectorAll('.lchip')].map(c=>c.childNodes[0].textContent.trim()),\n      notify:notify.checked,\n      roles:[...roleList.querySelectorAll('.role-row')].map(r=>({name:r.querySelector('.tin').value,role:r.querySelector('.rrole').value}))};\n  }\n  let saveBusy=false;\n  function save(){\n    if(saveBusy) return; saveBusy=true;\n    saveBtn.disabled=false;                          // keep it un-greyed during apply\n    saveBtn.classList.remove('done'); saveBtn.classList.add('applying'); saveBtn.textContent='Applying…';\n    sstate.textContent='Applying changes…'; sstate.className='sstate';\n    setTimeout(function(){\n      try{ localStorage.setItem(LS, JSON.stringify(gather())); }catch(e){}\n      const t=new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});\n      saveBtn.classList.remove('applying'); saveBtn.classList.add('done'); saveBtn.textContent='✓ Applied';\n      sstate.innerHTML='<span class=\"ok\">✓ Saved<\/span> · <span class=\"t\">last saved '+t+'<\/span>';\n      saveBusy=false;\n      setTimeout(function(){\n        if(saveBusy || sstate.classList.contains('unsaved')) return;   // user edited again → leave dirty state alone\n        saveBtn.classList.remove('done'); saveBtn.textContent='Save configuration'; saveBtn.disabled=true;\n      },1500);\n    },1500);\n  }\n  function applySaved(c){\n    if(!c) return;\n    if(c.th){th.value=c.th}\n    if(c.sens){sens.value=c.sens} if(c.arr){arr.value=c.arr}\n    if(c.reopenTh){reopenTh.value=c.reopenTh} if(c.entropyTh){entropyTh.value=c.entropyTh} if(c.dropoffTh){dropoffTh.value=c.dropoffTh}\n    if(c.lowMax){lowMax.value=c.lowMax} if(c.medMax){medMax.value=c.medMax}\n    if(c.forceDeep){forceDeep.value=c.forceDeep} if(c.t1sla){t1sla.value=c.t1sla}\n    if(c.t2sla){t2sla.value=c.t2sla} if(c.t3sla){t3sla.value=c.t3sla}\n    if(Array.isArray(c.csmLeads)&&c.csmLeads.length){ leadPool.innerHTML=''; c.csmLeads.forEach(nm=>leadPool.appendChild(makeChip(nm))); }\n    if(typeof c.notify==='boolean'){notify.checked=c.notify}\n    if(Array.isArray(c.roles)&&c.roles.length){\n      roleList.innerHTML='';\n      c.roles.forEach(r=>roleList.appendChild(makeRoleRow(r.name,r.role)));\n    }\n  }\n  function makeRoleRow(name,role){\n    const div=document.createElement('div'); div.className='role-row';\n    div.innerHTML='<input class=\"tin\"><select class=\"sel rrole\"><option>Director<\/option><option>Approver<\/option><option>Viewer<\/option><\/select><button class=\"rm\" title=\"remove\">✕<\/button>';\n    div.querySelector('.tin').value=name||'';\n    if(role) div.querySelector('.rrole').value=role;\n    div.querySelector('.tin').addEventListener('input',markDirty);\n    div.querySelector('.rrole').addEventListener('change',markDirty);\n    div.querySelector('.rm').addEventListener('click',()=>{div.remove();markDirty()});\n    return div;\n  }\n\n  // wire existing role rows\n  roleList.querySelectorAll('.role-row').forEach(r=>{\n    r.querySelector('.tin').addEventListener('input',markDirty);\n    r.querySelector('.rrole').addEventListener('change',markDirty);\n    r.querySelector('.rm').addEventListener('click',()=>{r.remove();markDirty()});\n  });\n  addRole.addEventListener('click',()=>{ roleList.appendChild(makeRoleRow('','Viewer')); markDirty(); });\n\n  // listeners\n  th.addEventListener('input',()=>{fmtThresh();markDirty()});\n  sens.addEventListener('input',()=>{previewS1();markDirty()});\n  arr.addEventListener('input',()=>{previewS1();markDirty()});\n  applySug.addEventListener('click',()=>{ sens.value=17; previewS1(); markDirty(); });\n  [lowMax,medMax].forEach(el=>el.addEventListener('input',()=>{fmtBlast();markDirty()}));\n  [reopenTh,entropyTh,dropoffTh].forEach(el=>el.addEventListener('input',markDirty));\n  [forceDeep,t1sla,t2sla,t3sla,notify].forEach(el=>el.addEventListener('change',markDirty));\n\n  // CSM Lead pool: chips + add\n  function makeChip(name){\n    const s=document.createElement('span'); s.className='lchip';\n    s.appendChild(document.createTextNode(name));\n    const b=document.createElement('button'); b.className='lchip-rm'; b.title='remove'; b.textContent='✕';\n    b.addEventListener('click',()=>{s.remove();markDirty()});\n    s.appendChild(b); return s;\n  }\n  leadPool.querySelectorAll('.lchip-rm').forEach(b=>b.addEventListener('click',()=>{b.closest('.lchip').remove();markDirty()}));\n  function addLeadFn(){ const v=leadInput.value.trim(); if(!v) return; leadPool.appendChild(makeChip(v)); leadInput.value=''; markDirty(); }\n  addLead.addEventListener('click',addLeadFn);\n  leadInput.addEventListener('keydown',e=>{ if(e.key==='Enter'){ e.preventDefault(); addLeadFn(); } });\n  saveBtn.addEventListener('click',save);\n\n  // init\n  (function(){\n    let saved=null; try{saved=JSON.parse(localStorage.getItem(LS))}catch(e){}\n    applySaved(saved);\n    fmtThresh(); previewS1(); fmtBlast();\n    if(saved){ sstate.innerHTML='<span class=\"ok\">✓ Saved<\/span> · <span class=\"t\">loaded your saved config<\/span>'; saveBtn.disabled=true; }\n    else { sstate.textContent='Not saved yet'; saveBtn.disabled=false; }\n  })();\n<\/script>\n<script>(function(){var TITLE={\"Setup & Config\":\"setup\",\"At-Risk Interactions\":\"atrisk\",\"Proposal Review\":\"proposal\",\"Calibration Status\":\"calibration\",\"Policy Execution Log\":\"policylog\"};var FILE={\"Step1_Setup_v2.html\":\"setup\",\"Step2_AtRisk_v2.html\":\"atrisk\",\"Step3_ProposalReview_v2.html\":\"proposal\",\"Step5_Calibration_v2.html\":\"calibration\",\"S4_PolicyLog_v2.html\":\"policylog\",\"00_Start_Here_Tour.html\":\"tour\"};document.addEventListener('click',function(e){var a=e.target.closest&&e.target.closest('a');if(!a)return;var k=TITLE[(a.getAttribute('title')||'').trim()]||FILE[a.getAttribute('href')];if(k){e.preventDefault();try{parent.postMessage({satpGo:k},'*');}catch(_){}}},true);})();<\/script><\/body>\n<\/html>\n", "atrisk": "<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>Step 2 · At-Risk Interactions — Stacked Agent Trust Protocol (Fin Operator style)<\/title>\n<link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n<link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin>\n<link href=\"https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,500;6..72,600&display=swap\" rel=\"stylesheet\">\n<style>\n  :root{\n    /* Fin Operator product UI: warm off-white, serif headlines, sparing orange→coral accent */\n    --bg:#fbfcfd; --panel:#ffffff; --panel-2:#f3f5f7; --raised:#eaedf1;\n    --ink:#161a1f; --text:#363b43; --muted:#646b75; --faint:#969ca6;\n    --line:#e2e6eb; --line-2:#edf0f3;\n    --orange:#ff5c28; --coral:#ff8a5b; --orange-soft:#fdeee6; --orange-line:#f6cdb8;\n    --grad:linear-gradient(135deg,#ff5c28,#ff8a5b);\n    --black:#1b1813;\n    --red:#cf4848; --red-soft:#fbeceb; --red-line:#f1cdca;\n    --amber:#a9761c; --amber-soft:#fbf3e3; --amber-line:#eccf9b;\n    --teal:#1f93ad; --green:#3f9e6a; --green-soft:#eaf4ee; --green-line:#c4e2cf; --violet:#6d5bd0;\n    --s1:#ff7a45; --s2:#1f93ad; --s3:#3f9e6a; --s4:#6d5bd0;\n    --serif:\"Newsreader\",\"Iowan Old Style\",\"Palatino Linotype\",Palatino,Georgia,\"Times New Roman\",serif;\n    --radius:14px;\n  }\n  *{box-sizing:border-box;margin:0;padding:0}\n  body{font-family:-apple-system,BlinkMacSystemFont,\"Segoe UI\",Inter,Roboto,Helvetica,Arial,sans-serif;\n    background:var(--bg);color:var(--text);line-height:1.5;-webkit-font-smoothing:antialiased}\n  .app{display:flex;height:100vh;overflow:hidden}\n\n  /* sidebar — light, airy, with a thin violet brand edge */\n  .side{width:256px;flex-shrink:0;background:var(--panel-2);border-right:1px solid var(--line);\n    display:flex;flex-direction:column;padding:22px 0;position:relative;transition:width .18s;overflow-y:auto}\n  .side:before{content:\"\";position:absolute;left:0;top:0;bottom:0;width:3px;\n    background:linear-gradient(180deg,#6d5bd0,#ff8a5b)}\n  .brand{padding:2px 24px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:11px}\n  .brand .mark{width:28px;height:28px;flex-shrink:0;display:flex;align-items:center;justify-content:center;line-height:0}\n  .brand .btxt{min-width:0}\n  .brand .name{font-family:var(--serif);font-size:16px;font-weight:600;letter-spacing:.01em;color:var(--ink)}\n  .brand .sub{font-size:11px;color:var(--faint);margin-top:4px}\n  .collapse-btn{margin-left:auto;flex-shrink:0;background:none;border:none;border-radius:7px;cursor:pointer;padding:4px;line-height:0;transition:.15s}\n  .collapse-btn:hover{background:var(--panel)}\n  .collapse-btn .cicon{width:18px;height:18px;display:block;opacity:.62;transition:opacity .15s ndled{opacity:.55;border-left:3px solid var(--green)}\n\n  /* view toggle: Topic <-> Account — two lenses on the same flagged data */\n  .viewtog{display:inline-flex;background:var(--panel-2);border:1px solid var(--line);border-radius:999px;padding:3px;margin:2px 0 18px;gap:2px}\n  .viewtog button{font:inherit;font-size:12.5px;font-weight:600;color:var(--muted);background:none;border:none;padding:7px 15px;border-radius:999px;cursor:pointer;display:flex;align-items:center;gap:7px}\n  .viewtog button.on{background:#fff;color:var(--ink);box-shadow:0 1px 2px rgba(27,24,19,.08)}\n  .viewtog .vd{width:7px;height:7px;border-radius:50%}\n  #viewTopic[hidden],#viewAccount[hidden]{display:none}\n  .acctnote{font-size:12.5px;color:var(--muted);line-height:1.55;margin-bottom:14px;max-width:760px}\n  .acctnote b{color:var(--ink)}\n  .acctlist{display:flex;flex-direction:column;gap:10px}\n  .acct{background:var(--panel);border:1px solid var(--line);border-radius:12px;box-shadow:0 1px 2px rgba(27,24,19,.03);overflow:hidden}\n  .acct.handled{opacity:.64;border-left:3px solid var(--green)}\n  .acct-row{display:flex;align-items:center;gap:13px;padding:14px 18px}\n  .acct-exp{background:none;border:none;cursor:pointer;color:var(--faint);font-size:12px;padding:0;width:14px;flex-shrink:0}\n  .acct-exp .acct-chev{display:inline-block;transition:transform .15s}\n  .acct-exp.open .acct-chev{transform:rotate(90deg)}\n  .acct-nm{font-family:var(--serif);font-size:17px;font-weight:600;color:var(--ink);flex-shrink:0}\n  .acct-meta{flex:1;font-size:12.5px;color:var(--muted)}.acct-meta b{color:var(--text)}\n  .acct-risk{font-size:11px;font-weight:700;padding:3px 10px;border-radius:999px;flex-shrink:0}\n  .acct-risk.high{background:var(--red-soft);color:var(--red);border:1px solid var(--red-line)}\n  .acct-risk.med{background:var(--amber-soft);color:var(--amber);border:1px solid var(--amber-line)}\n  .acct-topics-d{padding:0 18px 14px 45px;display:flex;flex-direction:column;gap:0}\n  .acct-topics-d[hidden]{display:none}\n  .atr{font-size:12.5px;color:var(--text);display:flex;justify-content:space-between;border-top:1px solid var(--line-2);padding:7px 0}\n  .atr .aro{color:var(--red);font-weight:600;font-variant-numeric:tabular-nums}\n\n  /* click-reaction states */\n  .acard.handled{opacity:.66;border-left:3px solid var(--green)}\n  .cta-done{display:flex;align-items:center;gap:9px;font-size:13px;font-weight:600;color:#2f7d52;margin-right:auto}\n  .cta-done .di{width:18px;height:18px;border-radius:50%;background:var(--green-soft);display:inline-flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0}\n  .btn.undo{background:transparent;color:var(--faint);border-color:var(--line)}\n  .btn.undo:hover{background:var(--panel-2);color:var(--text)}\n  /* CSM Lead picker (choose who to escalate to, from the configured pool) */\n  .leadpick{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-right:auto}\n  .pick-lab{font-size:12px;font-weight:600;color:var(--text)}\n  .pick-lead,.apick-lead{font:inherit;font-size:12.5px;font-weight:600;color:#c2521f;background:var(--orange-soft);border:1px solid var(--orange-line);padding:7px 13px;border-radius:8px;cursor:pointer}\n  .pick-lead:hover,.apick-lead:hover{background:#fde3d6}\n  .mondetail{margin:-3px 0 5px;padding:13px 16px;background:var(--panel-2);border:1px solid var(--line);border-radius:11px}\n  .mondetail .mdnote{font-size:12.5px;color:var(--muted);margin-bottom:11px}\n\n  /* S-c: low-key auto-handled stat — quiet, no邀功, sits beside the priority split */\n  .autostat{padding-left:18px;margin-left:4px;border-left:1px solid var(--line);cursor:default}\n  .autostat .an{font-family:var(--serif);font-size:26px;font-weight:600;font-variant-numeric:tabular-nums;line-height:1;color:var(--muted)}\n  .autostat .ak{font-size:11.5px;margin-top:4px;color:var(--faint)}\n\n  /* E1.1 — \"Not a real risk\" ghost dismiss action: visually weakest, plain text-button */\n  .btn.dismiss{background:transparent;color:var(--faint);border-color:transparent;padding:9px 8px;font-weight:500;order:-1;margin-right:6px}\n  .btn.dismiss:hover{color:var(--text);background:transparent;text-decoration:underline;text-underline-offset:3px}\n  /* reason picker that pops after clicking dismiss */\n  .dismiss-pick{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-right:auto}\n  .dismiss-pick .dp-lab{font-size:12px;color:var(--muted)}\n  .dp-opt{font:inherit;font-size:12px;color:var(--muted);background:var(--panel-2);border:1px solid var(--line);padding:6px 11px;border-radius:7px;cursor:pointer}\n  .dp-opt:hover{border-color:var(--line);color:var(--text);background:#fff}\n  .btn.dismiss-cancel{background:transparent;color:var(--muted);border-color:var(--line)}\n  .btn.dismiss-cancel:hover{background:var(--panel-2);color:var(--text)}\n  .dismissed-note{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--muted);margin-right:auto}\n  .dismissed-note .dk{color:var(--green)}\n  .acard.dismissed{opacity:.6;border-left:3px solid var(--green-line)}\n\n  /* E1.2 — S1 inline calibration proposal banner (must require approval, never silent) */\n  .calib{display:flex;align-items:center;gap:14px;background:var(--panel);border:1px solid var(--line);\n    border-radius:var(--radius);padding:15px 18px;margin:0 0 16px;box-shadow:0 1px 2px rgba(27,24,19,.03)}\n  /* respect the [hidden] attr: a class display:flex otherwise overrides the UA [hidden]{display:none},\n     which kept this banner visible on load and stopped \"Not now\" from dismissing it.\n     Key off [hidden] only (the JS toggles the attribute, not the class). */\n  .calib[hidden]{display:none}\n  .calib .ci{width:30px;height:30px;border-radius:8px;flex-shrink:0;background:rgba(109,91,208,.10);\n    color:var(--s4);display:flex;align-items:center;justify-content:center;font-size:15px}\n  .calib .ctxt{flex:1;font-size:12.5px;color:var(--text);line-height:1.5}\n  .calib .ctxt b{color:var(--ink);font-weight:600}\n  .calib .cbtns{display:flex;gap:8px;flex-shrink:0}\n  .calib .btn.approve{background:var(--panel-2);color:var(--s4);border-color:#d8d2f2;font-size:12.5px;padding:8px 14px}\n  .calib .btn.approve:hover{background:#ece8fa}\n  .calib .btn.defer{background:transparent;color:var(--muted);border-color:var(--line);font-size:12.5px;padding:8px 14px}\n  .calib .btn.defer:hover{background:var(--panel-2);color:var(--text)}\n  .calib.done{border-color:var(--green-line);background:var(--green-soft)}\n  .calib.done .ci{background:rgba(63,158,106,.12);color:var(--green)}\n  .calib.dismissed-banner{display:none}\n  .calib .cdone{font-size:12.5px;color:#2f7d52;line-height:1.5}.calib .cdone b{color:#246b43}\n\n  /* E1.3 — consequence gate: a previously-silenced detection that churned → reopen prompt (amber/--s4 quiet) */\n  .conseq{display:flex;align-items:center;gap:14px;background:var(--amber-soft);border:1px solid var(--amber-line);\n    border-radius:var(--radius);padding:14px 18px;margin:0 0 16px}\n  .conseq .qi{width:30px;height:30px;border-radius:8px;flex-shrink:0;background:rgba(169,118,28,.12);\n    color:var(--amber);display:flex;align-items:center;justify-content:center;font-size:15px}\n  .conseq .qtxt{flex:1;font-size:12.5px;color:#7a5a18;line-height:1.5}\n  .conseq .qtxt b{color:var(--amber);font-weight:700}\n  .conseq .qbtns{display:flex;gap:8px;flex-shrink:0}\n  .conseq .btn.reopen{background:#fff;color:var(--amber);border-color:var(--amber-line);font-size:12.5px;padding:8px 14px}\n  .conseq .btn.reopen:hover{background:var(--amber-soft)}\n  .conseq .btn.keep{background:transparent;color:#8a6a28;border-color:var(--amber-line);font-size:12.5px;padding:8px 14px}\n  .conseq .btn.keep:hover{background:rgba(169,118,28,.08)}\n  .conseq.done{border-color:var(--green-line);background:var(--green-soft)}\n  .conseq.done .qi{background:rgba(63,158,106,.12);color:var(--green)}\n  .conseq .qdone{font-size:12.5px;color:#2f7d52;line-height:1.5}.conseq .qdone b{color:#246b43}\n\n  .fo a satp_nav)\n  (function(){\n    var side=document.getElementById('side'), btn=document.getElementById('collapseBtn');\n    if(!side||!btn) return;\n    function apply(c){ side.classList.toggle('collapsed',c); btn.title=c?'Expand sidebar':'Collapse sidebar'; }\n    var saved; try{saved=localStorage.getItem('satp_nav')}catch(e){}\n    apply(saved==='collapsed');\n    btn.addEventListener('click',function(){\n      var c=!side.classList.contains('collapsed'); apply(c);\n      try{localStorage.setItem('satp_nav',c?'collapsed':'expanded')}catch(e){}\n    });\n  })();\n<\/script>\n<script>\n  // --- collapsible Monitor list (open <-> collapse) ---\n  const monToggle=document.getElementById('monToggle'), monList=document.getElementById('monList');\n  const monHint=monToggle.querySelector('.gh-n');\n  const HINT='9 over threshold but narrowly · watch before routing';\n  monToggle.addEventListener('click',()=>{\n    const open=monToggle.getAttribute('aria-expanded')==='true';\n    monToggle.setAttribute('aria-expanded',String(!open));\n    monList.hidden=open;\n    monHint.textContent=HINT+(open?' — tap to expand':' — tap to collapse');\n  });\n\n  // --- real click reactions ---\n  let n=4470; const ticket=()=>'OPS-'+(++n);\n  // CSM Lead pool — read from Setup's saved config if present, else default\n  const CSM=(()=>{ try{const c=JSON.parse(localStorage.getItem('satp_setup_config')); if(c&&Array.isArray(c.csmLeads)&&c.csmLeads.length) return c.csmLeads;}catch(e){} return ['Marcus Webb','Dana Lee','Priya Nair']; })();\n  const first=s=>s.split(' ')[0];\n\n  function confirmRCA(row){\n    if(!row.dataset.orig) row.dataset.orig=row.innerHTML;\n    row.innerHTML='<span class=\"cta-done\"><span class=\"di\">✓<\/span>Sent to Operator RCA pipeline · ticket '+ticket()+' · SLA 4h<\/span><a class=\"btn undo\" href=\"#\">Undo<\/a>';\n  }\n  function openPicker(row){\n    if(!row.dataset.orig) row.dataset.orig=row.innerHTML;\n    row.innerHTML='<div class=\"leadpick\"><span class=\" rted target indicator — small label ahead of the decision */\n  .goaltag{display:inline-flex;align-items:center;gap:9px;font-size:11.5px;padding:6px 13px;border-radius:999px;\n    background:var(--orange-soft);border:1px solid var(--orange-line)}\n  .goaltag .gk{font-size:10px;font-weight:700;letter-spacing:.08em;color:#c2521f}\n  .goaltag .gv{color:var(--text)}.goaltag .gv b{color:#c2521f;font-weight:700}\n\n  /* post-ship verification — positive framing, sits inside the decided confirm banner */\n  .verify{display:none;margin-top:12px;border-top:1px solid var(--green-line);padding-top:12px}\n  .decided .confirm.approved .verify{display:block}\n  .verify .vrow{display:flex;align-items:center;gap:9px;font-size:12.5px;color:#1f6b42}\n  .verify .vrow .vchk{font-weight:700;color:var(--green)}\n  .verify .vrow b{color:#1f6b42;font-weight:700;font-variant-numeric:tabular-nums}\n  .verify .vhit{font-weight:600}\n  .verify .vunder{margin-top:7px;font-size:11.5px;color:var(--faint);line-height:1.55}\n  .verify .vconf{margin-top:7px;font-size:11.5px;color:var(--muted);line-height:1.55;\n    border-top:1px dashed var(--green-line);padding-top:8px}\n  .verify .vconf b{color:var(--text);font-weight:600}\n\n  /* three actions, UNEQUAL visual weight (approve biggest by downstream blast) */\n  .actions{display:flex;align-items:stretch;gap:14px;margin-bottom:10px}\n  .act{border:none;cursor:pointer;border-radius:var(--radius);text-align:left;font-family:inherit;\n    display:flex;flex-direction:column;justify-content:center;transition:transform .12s,box-shadow .12s}\n  .act:hover{transform:translateY(-1px)}\n  .act .verb{font-family:var(--serif);font-weight:600;letter-spacing:-.01em;color:var(--ink)}\n  .act.approve{flex:2.4;background:var(--black);color:#fff;padding:26px 26px;\n    box-shadow:0 8px 22px rgba(255,92,40,.28);transition:transform .12s,box-shadow .12s,filter .12s}\n  .act.approve:hover{transform:translateY(-1px);box-shadow:0 11px 28px rgba(255,92,40,.36);filter:brightness(1.12)}\n  .act.approve:active{transform:translateY(0);filter:brightness(.96)}\n  .act.approve .verb{font-size:23px;margin-bottom:6px;color:#fff}\n  .act.approve .conseq{font-size:13px;color:#fff;opacity:.94;line-height:1.55}\n  .act.approve .scope{display:inline-block;margin-top:13px;font-size:11.5px;font-weight:700;\n    background:rgba(27,24,19,.18);padding:4px 12px;border-radius:999px;align-self:flex-start}\n  .act.reject{flex:1;background:var(--panel);border:1px solid var(--line);color:var(--ink);padding:16px 17px}\n  .act.reject:hover{box-shadow:0 3px 10px rgba(27,24,19,.07)}\n  .act.reject .verb{font-size:15px;margin-bottom:4px}\n  .act.reject .conseq{font-size:11.5px;color:var(--muted);line-height:1.5}\n  .act.reject .loop{display:inline-block;margin-top:9px;font-size:10.5px;font-weight:700;\n    color:var(--violet);background:#f0edfa;border:1px solid #e0d9f4;padding:3px 9px;border-radius:999px}\n  .act.escalate{flex:.85;background:var(--panel);border:1px solid var(--red-line);color:var(--ink);padding:14px 15px}\n  .act.escalate:hover{box-shadow:0 3px 10px rgba(207,72,72,.12)}\n  .act.escalate .verb{font-size:14px;margin-bottom:4px;color:var(--red)}\n  .act.escalate .conseq{font-size:11px;color:var(--muted);line-height:1.5}\n  .act.escalate .sla{display:inline-block;margin-top:8px;font-size:10px;font-weight:700;\n    color:var(--red);background:var(--red-soft);border:1px solid var(--red-line);padding:3px 9px;border-radius:999px}\n\n  .sizenote{text-align:center;font-size:11.5px;color:var(--faint);font-style:italic;margin-bottom:6px}\n\n  .loopnote{display:flex;gap:11px;align-items:flex-start;background:var(--panel-2);border:1px solid var(--line);\n    border-left:3px solid var(--violet);border-radius:0 11px 11px 0;padding:12px 16px;margin-top:16px;font-size:12px;color:var(--text);line-height:1.6}\n  .loopnote .tag{font-size:10px;font-weight:700;letter-spacing:.07em;color:var(--violet);text-transform:uppercase;flex-shrink:0;margin-top:1px}\n  .loopnote b{color:var(--ink)}\n\n  /* Deep decision confirmation banner (replaces the three actions once a decision is made) */\n  .decided .actions,.decided .sizenote{display:none}\n  /* double-confirm before ship */\n  .shipconfirm{display:none;flex-direction:column;gap:11px;background:#fff7f2;border:1px solid var(--orange-line);border-radius:var(--radius);padding:18px 20px}\n  .proposal.confirming .actions,.proposal.confirming .sizenote{display:none}\n  .proposal.confirming .shipconfirm{display:flex}\n  .shipconfirm .sc-h{display:flex;align-items:center;gap:9px;font-family:var(--serif);font-size:16px;font-weight:600;color:#b3431a}\n  .shipconfirm .sc-ic{color:var(--orange)}\n  .shipconfirm .sc-b{font-size:12.5px;color:var(--muted);line-height:1.6}\n  .shipconfirm .sc-act{display:flex;gap:10px;margin-top:2px}\n  .sc-go{font:inherit;font-size:13px;font-weight:700;color:#fff;background:var(--black);border:none;padding:11px 20px;border-radius:9px;cursor:pointer;box-shadow:0 2px 9px rgba(255,92,40,.3);transition:filter .12s,transform .12s}\n  .sc-go:hover{filter:brightness(1.12)}\n  .sc-go:active:not(.applying){transform:translateY(1px);filter:brightness(.96)}\n  /* Operator-style \"applying\" state on the primary ship action — Fin gradient flows while shipping */\n  .sc-go.applying{background:linear-gradient(90deg,#ff5c28,#6d5bd0,#9ba2ae,#ff5c28);background-size:300% 100%;color:#fff;text-shadow:0 1px 2px rgba(27,24,19,.3);cursor:default;box-shadow:0 3px 14px rgba(255,92,40,.42);animation:applyFlow 1.5s linear infinite}\n  @keyframes applyFlow{0%{background-position:300% 50%}100%{background-position:0% 50%}}\n  .sc-cancel{font:inherit;font-size:13px;font-weight:600;color:var(--muted);background:#fff;border:1px solid var(--line);padding:11px 18px;border-radius:9px;cursor:pointer}\n  .sc-cancel:hover{background:var(--panel-2);color:var(--text)}\n  .confirm{display:none;gap:14px;align-items:flex-start;border-radius:var(--radius);padding:18px 20px;\n    border:1px solid var(--line-2);background:var(--panel-2);line-height:1.6}\n  .decided .confirm{display:flex}\n  .confirm .cic{font-size:18px;line-height:1.2;flex-shrink:0;margin-top:1px;font-weight:700}\n  .confirm .cmsg{flex:1;font-size:13.5px;color:var(--text)}\n  .confirm .cmsg b{color:var(--ink);font-weight:600}\n  .confirm .cmsg .clog{display:block;margin-top:5px;font-size:11.5px;color:var(--faint)}\n  .confirm .cundo{font-family:inherit;cursor:pointer;font-size:11px;font-weight:700;letter-spacing:.04em;\n    text-transform:uppercase;color:var(--muted);background:var(--panel);border:1px solid var(--line);\n    padding:7px 14px;border-radius:999px;flex-shrink:0;transition:.15s}\n  .confirm .cundo:hover{background:var(--raised);color:var(--text)}\n  .confirm.approved{background:var(--green-soft);border-color:var(--green-line)}\n  .confirm.approved .cic{color:var(--green)} .confirm.approved .cmsg b{color:#1f6b42}\n  .confirm.rejected{background:#f6f4fc;border-color:#e0d9f4}\n  .confirm.rejected .cic{color:var(--violet)} .confirm.rejected .cmsg b{color:#4f3fb0}\n  .confirm.escalated{background:var(--red-soft);border-color:var(--red-line)}\n  .confirm.escalated .cic{color:var(--red)} .confirm.escalated .cmsg b{color:#a83838}\n  /* header decided-state badge */\n  .phead .pstate{display:none;font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;\n    padding:3px 11px;border-radius:999px;border:1px solid}\n  .decided .phead .pstate{display:inline-flex;align-items:center;gap:5px}\n  .phead .pstate.approved{background:var(--green-soft);color:#2f7d52;border-color:var(--green-line)}\n  .phead .pstate.rejected{background:#f6f4fc;color:var(--violet);border-color:#e0d9f4}\n  .phead .pstate.escalated{background:var(--red-soft);color:var(--red);border-color:var(--red-line)}\n\n  /* ===== expand affordance shared by Quick cards & Auto rows ===== */\n  .chev{font-family:inherit;cursor:pointer;border:1px solid var(--line);background:var(--panel);\n    color:var(--muted);width:24px;height:24px;border-radius:7px;flex-shrink:0;font-size:11px;line-height:1;\n    display:inline-flex;align-items:center;justify-content:center;transition:.18s}\n  .chev:hover{background:var(--raised);color:var(--text)}\n  .chev .cv{display:inline-block;transition:transform .2s}\n  .expanded .chev .cv{transform:rotate(180deg)}\n  .qrow,.arow{cursor:pointer;flex-wrap:wrap}\n  .detail{display:none;width:100%;background:var(--panel-2);border:1px solid var(--line-2);border-radius:10px;\n    padding:14px 16px;margin:2px 0 10px;line-height:1.65}\n  .expanded .detail{display:block}\n  .detail .dline{font-size:12.5px;color:var(--text);margin-bottom:8px}\n  .detail .dline:last-child{margin-bottom:0}\n  .detail .dline b{color:var(--ink);font-weight:600}\n  .detail .dk{display:inline-block;min-width:96px;font-size:10px;font-weight:700;letter-spacing:.08em;\n    text-transform:uppercase;color:var(--faint);vertical-align:top}\n  .detail .dwhy{font-size:12px;color:var(--muted);font-style:italic;border-top:1px solid var(--line);\n    padding-top:9px;margin-top:9px}\n  .detail .dwhy b{color:var(--text);font-style:normal}\n  .qrow.handled .chev{display:none}\n\n  /* ============================================================\n     SECTION 2 — QUICK: compact one-line cards, clearly lighter\n     ============================================================ */\n  .qcap{font-size:12px;color:var(--muted);margin:0 0 13px;line-height:1.65;font-style:italic}.qcap b{color:var(--text)}\n  .qrow{display:flex;align-items:center;gap:14px;background:var(--panel);border:1px solid var(--line);\n    border-left:3px solid var(--amber);border-radius:11px;padding:13px 18px;margin-bottom:10px;\n    box-shadow:0 1px 2px rgba(27,24,19,.03);transition:.18s}\n  .qrow .qid{font-size:12px;color:var(--faint);font-weight:600;width:74px;flex-shrink:0;font-variant-numeric:tabular-nums}\n  .qrow .qdesc{font-size:13px;color:var(--text);flex:1;line-height:1.45}\n  .qrow .qdesc b{color:var(--ink);font-weight:600}\n  .qrow .
