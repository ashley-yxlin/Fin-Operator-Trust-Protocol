W · 10:02<\/span>\n        <span class=\"rdone\">↩ <b>Revoked<\/b> · #PR-2841 pulled back to manual review · logged to Policy Log<\/span>\n        <button class=\"revoke\">Revoke<\/button>\n        <button class=\"undo\">Undo<\/button>\n        <div class=\"detail\">\n          <div class=\"dline\"><span class=\"dk\">What changed<\/span>Moved the SLA reminder on Template A from T-2h to T-4h before breach.<\/div>\n          <div class=\"dline\"><span class=\"dk\">Confidence<\/span><b>0.91<\/b> · above your 0.71 threshold<\/div>\n          <div class=\"dline\"><span class=\"dk\">Blast<\/span><b>LOW<\/b> · 2 accounts<\/div>\n          <div class=\"dline\"><span class=\"dk\">Shipped<\/span>10:02 · today<\/div>\n          <div class=\"dwhy\"><b>Why auto-pass:<\/b> confidence above threshold + LOW blast → auto-approved per your config.<br>Downstream: <b>no reopen spike since<\/b> — reminders firing as expected.<\/div>\n        <\/div>\n      <\/div>\n      <div class=\"arow\" data-id=\"#PR-2844\">\n        <span class=\"ok\"><\/span>\n        <span class=\"aid\">#PR-2844<\/span>\n        <span class=\"afix\">Fix broken KB link in <b>onboarding<\/b> flow · <b>11 accounts<\/b><\/span>\n        <span class=\"ameta\">conf 0.85 · LOW · 11:37<\/span>\n        <span class=\"rdone\">↩ <b>Revoked<\/b> · #PR-2844 pulled back to manual review · logged to Policy Log<\/span>\n        <button class=\"revoke\">Revoke<\/button>\n        <button class=\"undo\">Undo<\/button>\n        <div class=\"detail\">\n          <div class=\"dline\"><span class=\"dk\">What changed<\/span>Repointed a dead KB link in the onboarding flow to the current setup guide.<\/div>\n          <div class=\"dline\"><span class=\"dk\">Confidence<\/span><b>0.85<\/b> · above your 0.71 threshold<\/div>\n          <div class=\"dline\"><span class=\"dk\">Blast<\/span><b>LOW<\/b> · 11 accounts<\/div>\n          <div class=\"dline\"><span class=\"dk\">Shipped<\/span>11:37 · today<\/div>\n          <div class=\"dwhy\"><b>Why auto-pass:<\/b> confidence above threshold + LOW blast → auto-approved per your config.<br>Downstream: <b>no reopen spike since<\/b> — link click-through restored to baseline.<\/div>\n        <\/div>\n      <\/div>\n      <div class=\"arow\" data-id=\"#PR-2846\">\n        <span class=\"ok\"><\/span>\n        <span class=\"aid\">#PR-2846<\/span>\n        <span class=\"afix\">Correct typo in <b>refund confirmation<\/b> macro · <b>4 accounts<\/b><\/span>\n        <span class=\"ameta\">conf 0.93 · LOW · 12:08<\/span>\n        <span class=\"rdone\">↩ <b>Revoked<\/b> · #PR-2846 pulled back to manual review · logged to Policy Log<\/span>\n        <button class=\"revoke\">Revoke<\/button>\n        <button class=\"undo\">Undo<\/button>\n        <div class=\"detail\">\n          <div class=\"dline\"><span class=\"dk\">What changed<\/span>Fixed a typo (“recieved” → “received”) in the refund-confirmation macro.<\/div>\n          <div class=\"dline\"><span class=\"dk\">Confidence<\/span><b>0.93<\/b> · above your 0.71 threshold<\/div>\n          <div class=\"dline\"><span class=\"dk\">Blast<\/span><b>LOW<\/b> · 4 accounts<\/div>\n          <div class=\"dline\"><span class=\"dk\">Shipped<\/span>12:08 · today<\/div>\n          <div class=\"dwhy\"><b>Why auto-pass:<\/b> confidence above threshold + LOW blast → auto-approved per your config.<br>Downstream: <b>no reopen spike since<\/b> — highest-confidence change in today's batch.<\/div>\n        <\/div>\n      <\/div>\n      <div class=\"arow\" data-id=\"#PR-2848\">\n        <span class=\"ok\"><\/span>\n        <span class=\"aid\">#PR-2848<\/span>\n        <span class=\"afix\">Add link to <b>status page<\/b> in outage reply · <b>9 accounts<\/b><\/span>\n        <span class=\"ameta\">conf 0.87 · LOW · 13:25<\/span>\n        <span class=\"rdone\">↩ <b>Revoked<\/b> · #PR-2848 pulled back to manual review · logged to Policy Log<\/span>\n        <button class=\"revoke\">Revoke<\/button>\n        <button class=\"undo\">Undo<\/button>\n        <div class=\"detail\">\n          <div class=\"dline\"><span class=\"dk\">What changed<\/span>Added a status-page link to the standard outage acknowledgement reply.<\/div>\n          <div class=\"dline\"><span class=\"dk\">Confidence<\/span><b>0.87<\/b> · above your 0.71 threshold<\/div>\n          <div class=\"dline\"><span class=\"dk\">Blast<\/span><b>LOW<\/b> · 9 accounts<\/div>\n          <div class=\"dline\"><span class=\"dk\">Shipped<\/span>13:25 · today<\/div>\n          <div class=\"dwhy\"><b>Why auto-pass:<\/b> confidence above threshold + LOW blast → auto-approved per your config.<br>Downstream: <b>no reopen spike since<\/b> — deflection on outage tickets up slightly.<\/div>\n        <\/div>\n      <\/div>\n    <\/div>\n\n  <\/main>\n<\/div>\n\n<script>\n  // collapsible icon sidebar (shared across the 5 prototype pages via satp_nav)\n  (function(){\n    var side=document.getElementById('side'), btn=document.getElementById('collapseBtn');\n    if(!side||!btn) return;\n    function apply(c){ side.classList.toggle('collapsed',c); btn.title=c?'Expand sidebar':'Collapse sidebar'; }\n    var saved; try{saved=localStorage.getItem('satp_nav')}catch(e){}\n    apply(saved==='collapsed');\n    btn.addEventListener('click',function(){\n      var c=!side.classList.contains('collapsed'); apply(c);\n      try{localStorage.setItem('satp_nav',c?'collapsed':'expanded')}catch(e){}\n    });\n  })();\n<\/script>\n<script>\n  // ===== Section 3 — Auto-approved: expand (body) / revoke / undo (delegated) =====\n  document.querySelector('.autolist').addEventListener('click', function(e){\n    var revokeBtn = e.target.closest('.revoke');\n    var undoBtn   = e.target.closest('.undo');\n    if (revokeBtn){\n      revokeBtn.closest('.arow').classList.add('revoked');   // pulled back to manual review, logged to Policy Log (demo)\n      return;\n    }\n    if (undoBtn){\n      undoBtn.closest('.arow').classList.remove('revoked');\n      return;\n    }\n    // any other click on the row body toggles the detail panel\n    var row = e.target.closest('.arow');\n    if (row) row.classList.toggle('expanded');\n  });\n\n  // ===== Section 2 — Quick Review: expand (body) / approve / reject (inline confirm) / undo|rollback (delegated) =====\n  var qRoll = 7740;\n  document.querySelector('.quicklist').addEventListener('click', function(e){\n    var approveBtn = e.target.closest('.qapprove');\n    var rejectBtn  = e.target.closest('.qreject');\n    var undoBtn    = e.target.closest('.qundo');\n    if (approveBtn){\n      var row = approveBtn.closest('.qrow');\n      row.classList.remove('expanded');                      // collapse detail when handled\n      row.classList.add('handled','approved');\n      row.querySelector('.qdone').innerHTML = '✓ <b>Approved<\/b> · ' + row.dataset.id + ' shipped';\n      row.querySelector('.qundo').textContent = 'Request rollback';   // shipped → no Undo, offer rollback\n      return;\n    }\n    if (rejectBtn){\n      var row = rejectBtn.closest('.qrow');\n      row.classList.remove('expanded');\n      row.classList.add('handled','rejected');\n      row.querySelector('.qdone').innerHTML = '✓ <b>Rejected<\/b> · ' + row.dataset.id + ' → triggers refinement loop (S4.1)';\n      row.querySelector('.qundo').textContent = 'Undo';               // not shipped → undo is fine\n      return;\n    }\n    if (undoBtn){\n      var qr = undoBtn.closest('.qrow');\n      if (qr.classList.contains('approved')){                         // already shipped → request rollback, don't pretend it didn't happen\n        qr.querySelector('.qdone').innerHTML = '✓ <b>Approved<\/b> · ' + qr.dataset.id + ' shipped &nbsp;<span style=\"color:var(--amber);font-weight:600\">↳ rollback requested (#ROLL-' + (++qRoll) + ') · Operator will revert<\/span>';\n        undoBtn.style.display = 'none';\n      } else {                                                        // rejected → restore\n        qr.classList.remove('handled','approved','rejected');\n        qr.querySelector('.qundo').textContent = 'Undo';\n        undoBtn.style.display = '';\n      }\n      return;\n    }\n    // any other click on the card body (not the action/undo buttons) toggles the detail panel\n    var qrow = e.target.closest('.qrow');\n    if (qrow && !qrow.classList.contains('handled')) qrow.classList.toggle('expanded');\n  });\n\n  // ===== Section 1 — Deep: decision → confirmation banner + Undo, header state badge =====\n  (function(){\n    var proposal = document.getElementById('deepProposal');\n    var confirm  = document.getElementById('deepConfirm');\n    var msg      = document.getElementById('deepMsgMain');\n    var state    = document.getElementById('deepState');\n    var undo     = document.getElementById('deepUndo');\n    var rollback = document.getElementById('deepRollback');\n    var loopnote = document.getElementById('loopnote');\n\n    var COPY = {\n      approved:  {label:'Approved', cic:'✓',\n        msg:'<b>Approved &amp; shipped<\/b> · Template C is now live to 312 Enterprise accounts<span class=\"clog\">↳ written to Policy Log · you released this change<\/span>'},\n      rejected:  {label:'Rejected', cic:'✓',\n        msg:'<b>Rejected<\/b> · returned to your Fin Operator<span class=\"clog\">↳ S4.1 refinement loop triggered &amp; logged<\/span>'},\n      escalated: {label:'Escalated', cic:'✓',\n        msg:'<b>Escalated to Incident Review Board<\/b> · SLA 1h<span class=\"clog\">↳ logged to Policy Log<\/span>'}\n    };\n\n    function clearState(){\n      proposal.classList.remove('decided','confirming');\n      confirm.classList.remove('approved','rejected','escalated');\n      state.classList.remove('approved','rejected','escalated');\n      undo.style.display=''; rollback.style.display='none';\n    }\n\n    function commit(d){\n      var c = COPY[d];\n      clearState();\n      confirm.querySelector('.cic').textContent = c.cic;\n      msg.innerHTML = c.msg;\n      confirm.classList.add(d);\n      state.textContent = c.label;\n      state.classList.add(d);\n      proposal.classList.add('decided');\n      // already shipped → no Undo (it's live); offer the honest reversal instead\n      if (d === 'approved'){ undo.style.display='none'; rollback.style.display=''; }\n      else { undo.style.display=''; rollback.style.display='none'; }\n      // reject keeps the original behaviour: surface the S4.1 loop note\n      if (d === 'rejected' && loopnote){\n        loopnote.scrollIntoView({behavior:'smooth', block:'center'});\n        loopnote.animate(\n          [{boxShadow:'0 0 0 0 rgba(109,91,208,.0)'},\n           {boxShadow:'0 0 0 4px rgba(109,91,208,.22)'},\n           {boxShadow:'0 0 0 0 rgba(109,91,208,.0)'}],\n          {duration:1100, iterations:2}\n        );\n      }\n    }\n\n    document.querySelector('.actions').addEventListener('click', function(e){\n      var btn = e.target.closest('.act');\n      if (!btn) return;\n      var d = btn.dataset.decision;\n      if (d === 'approved'){ proposal.classList.add('confirming'); return; } // double-confirm before ship\n      commit(d);\n    });\n\n    document.getElementById('shipGo').addEventListener('click', function(){\n      var b=this; if(b.classList.contains('applying')) return;\n      b.classList.add('applying'); b.textContent='Shipping to 312 accounts…';\n      setTimeout(function(){\n        b.classList.remove('applying'); b.textContent='Confirm & ship to 312 accounts';\n        commit('approved');\n      },1500);\n    });\n    document.getElementById('shipCancel').addEventListener('click', function(){ proposal.classList.remove('confirming'); });\n    undo.addEventListener('click', clearState);             // restore the three actions (only for not-yet-shipped decisions)\n    rollback.addEventListener('click', function(){          // shipped → can't undo; request an Operator rollback (trackable status progression)\n      rollback.style.display='none';\n      var line = document.createElement('span');\n      line.className = 'clog rollstatus';\n      msg.appendChild(line);\n      var steps = [\n        '↳ rollback requested #ROLL-7741',\n        '↳ Operator reverting…',\n        '↳ ✓ reverted · Template C rolled back · tracked in Policy Log'\n      ];\n      line.textContent = steps[0];\n      setTimeout(function(){ line.textContent = steps[1]; }, 1100);\n      setTimeout(function(){ line.textContent = steps[2]; }, 2400);\n    });\n  })();\n<\/script>\n<script>(function(){var TITLE={\"Setup & Config\":\"setup\",\"At-Risk Interactions\":\"atrisk\",\"Proposal Review\":\"proposal\",\"Calibration Status\":\"calibration\",\"Policy Execution Log\":\"policylog\"};var FILE={\"Step1_Setup_v2.html\":\"setup\",\"Step2_AtRisk_v2.html\":\"atrisk\",\"Step3_ProposalReview_v2.html\":\"proposal\",\"Step5_Calibration_v2.html\":\"calibration\",\"S4_PolicyLog_v2.html\":\"policylog\",\"00_Start_Here_Tour.html\":\"tour\"};document.addEventListener('click',function(e){var a=e.target.closest&&e.target.closest('a');if(!a)return;var k=TITLE[(a.getAttribute('title')||'').trim()]||FILE[a.getAttribute('href')];if(k){e.preventDefault();try{parent.postMessage({satpGo:k},'*');}catch(_){}}},true);})();<\/script><\/body>\n<\/html>\n", "calibration": "<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>Step 5 · Calibration Status — Stacked Agent Trust Protocol (Fin Operator style)<\/title>\n<link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n<link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin>\n<link href=\"https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,500;6..72,600&display=swap\" rel=\"stylesheet\">\n<style>\n  :root{\n    /* Fin Operator product UI: warm off-white, serif headlines, sparing orange→coral accent */\n    --bg:#fbfcfd; --panel:#ffffff; --panel-2:#f3f5f7; --raised:#eaedf1;\n    --ink:#161a1f; --text:#363b43; --muted:#646b75; --faint:#969ca6;\n    --line:#e2e6eb; --line-2:#edf0f3;\n    --orange:#ff5c28; --coral:#ff8a5b; --orange-soft:#fdeee6; --orange-line:#f6cdb8;\n    --grad:linear-gradient(135deg,#ff5c28,#ff8a5b);\n    --black:#1b1813;\n    --red:#cf4848; --red-soft:#fbeceb; --red-line:#f1cdca;\n    --amber:#a9761c; --amber-soft:#fbf3e3; --amber-line:#eccf9b;\n    --teal:#1f93ad; --green:#3f9e6a; --green-soft:#eaf4ee; --green-line:#c4e2cf; --violet:#6d5bd0;\n    --s1:#ff7a45; --s2:#1f93ad; --s3:#3f9e6a; --s4:#6d5bd0; --s4-soft:#efedfa; --s4-line:#d8d2f1;\n    --serif:\"Newsreader\",\"Iowan Old Style\",\"Palatino Linotype\",Palatino,Georgia,\"Times New Roman\",serif;\n    --radius:14px;\n  }\n  *{box-sizing:border-box;margin:0;padding:0}\n  body{font-family:-apple-system,BlinkMacSystemFont,\"Segoe UI\",Inter,Roboto,Helvetica,Arial,sans-serif;\n    background:var(--bg);color:var(--text);line-height:1.5;-webkit-font-smoothing:antialiased}\n  .app{display:flex;height:100vh;overflow:hidden}\n\n  /* sidebar — light, airy, with a thin violet brand edge */\n  .side{width:256px;flex-shrink:0;background:var(--panel-2);border-right:1px solid var(--line);\n    display:flex;flex-direction:column;padding:22px 0;position:relative;transition:width .18s;overflow-y:auto}\n  .side:before{content:\"\";position:absolute;left:0;top:0;bottom:0;width:3px;\n    background:linear-gradient(180deg,#6d5bd0,#ff8a5b)}\n  .brand{padding:2px 24px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:11px}\n  .brand .mark{width:28px;height:28px;flex-shrink:0;display:flex;align-items:center;justify-content:center;line-height:0}\n  .brand .btxt{min-width:0}\n  .brand .name{font-family:var(--serif);font-size:16px;font-weight:600;letter-spacing:.01em;color:var(--ink)}\n  .brand .sub{font-size:11px;color:var(--faint);margin-top:4px}\n  .collapse-btn{margin-left:auto;flex-shrink:0;background:none;border:none;border-radius:7px;cursor:pointer;padding:4px;line-height:0;transition:.15s}\n  .collapse-btn:hover{background:var(--panel) hether the drift metric can even be trusted.<\/p>\n\n    <!-- explicit weekly rail: the visual cue that screams \"weeks, not days\" -->\n    <div class=\"weekrail\">\n      <span class=\"wk\">Apr 21<\/span><span class=\"sep\">›<\/span>\n      <span class=\"wk\">Apr 28<\/span><span class=\"sep\">›<\/span>\n      <span class=\"wk\">May 5<\/span><span class=\"sep\">›<\/span>\n      <span class=\"wk\">May 12<\/span><span class=\"sep\">›<\/span>\n      <span class=\"wk\">May 19<\/span><span class=\"sep\">›<\/span>\n      <span class=\"wk\">May 26<\/span><span class=\"sep\">›<\/span>\n      <span class=\"wk now\">Week of Jun 2–8 · now<\/span>\n    <\/div>\n\n    <!-- READING ORDER 1: the three trend lines, whole-picture first -->\n    <div class=\"kpis\">\n      <div class=\"kpi\">\n        <div class=\"lab\"><span class=\"swatch\" style=\"background:var(--orange)\"><\/span>Approval Rate<span class=\"info\">i<\/span><span class=\"kpitip\"><span class=\"ttl\">Approval Rate<\/span>Of the fixes Fin Operator proposed, the share that passed the S2 gate this week — a read on how good its proposals are. Heads-up: this can also drop just because the gate got stricter (S4.2), not because Operator got worse — so read it next to the other two.<\/span><\/div>\n        <div class=\"val\">68.4%<\/div>\n        <div class=\"delta down\">▼ 1.2pp vs 7-week start<\/div>\n      <\/div>\n      <div class=\"kpi\">\n        <div class=\"lab\"><span class=\"swatch\" style=\"background:var(--teal)\"><\/span>Downstream Verification<span class=\"info\">i<\/span><span class=\"kpitip\"><span class=\"ttl\">Downstream Verification<\/span>After a fix ships, the share of affected accounts that didn't reopen the topic — i.e. the fix actually held. Counted account-by-account, not as an overall average, so a few high-value accounts can't be hidden by the crowd.<\/span><\/div>\n        <div class=\"val\">81.3%<\/div>\n        <div class=\"delta flat\">▼ 0.5pp · essentially flat<\/div>\n      <\/div>\n      <div class=\"kpi\">\n        <div class=\"lab\"><span class=\"swatch\" style=\"background:var(--red)\"><\/span>Calibration Drift<span class=\"info\">i<\/span><span class=\"kpitip\"><span class=\"ttl\">Calibration Drift<\/span>How far Operator's accuracy on a topic has moved from its normal level (over 7 weeks). Going up means Operator may be slipping — but if Downstream Verification isn't dropping too, the drift could be a false alarm worth checking before you act.<\/span><\/div>\n        <div class=\"val\">+4.2pp<\/div>\n        <div class=\"delta up\">▲ trending up · 3 weeks running<\/div>\n      <\/div>\n    <\/div>\n\n    <div class=\"trendpanel\">\n      <h3>Three calibration trends — Fin Operator (by topic) · 7-week window<\/h3>\n      <div class=\"cap\">Weekly readings · Apr 21 → Jun 8 · each point = one week, not one day<\/div>\n      <div class=\"chartwrap\" id=\"chartwrap\">\n      <svg viewBox=\"0 0 720 240\" width=\"100%\" height=\"240\" preserveAspectRatio=\"none\" aria-label=\"four-week calibration trends\">\n        <!-- horizontal grid -->\n        <line x1=\"0\" y1=\"40\" x2=\"720\" y2=\"40\" stroke=\"#f0ece4\"/>\n        <line x1=\"0\" y1=\"90\" x2=\"720\" y2=\"90\" stroke=\"#f0ece4\"/>\n        <line x1=\"0\" y1=\"140\" x2=\"720\" y2=\"140\" stroke=\"#f0ece4\"/>\n        <line x1=\"0\" y1=\"190\" x2=\"720\" y2=\"190\" stroke=\"#f0ece4\"/>\n        <!-- vertical week separators -->\n        <line x1=\"90\" y1=\"10\" x2=\"90\" y2=\"210\" stroke=\"#f0ece4\"/>\n        <line x1=\"300\" y1=\"10\" x2=\"300\" y2=\"210\" stroke=\"#f0ece4\"/>\n        <line x1=\"510\" y1=\"10\" x2=\"510\" y2=\"210\" stroke=\"#f0ece4\"/>\n\n        <!-- Approval Rate (orange): bumpy — up, dip, partial recover, down. NOT smooth. -->\n        <polyline fill=\"none\" stroke=\"#ff5c28\" stroke-width=\"2.4\"\n          points=\"90,72 195,60 300,96 405,78 510,70 615,104 700,88\"/>\n        <!-- Downstream Verification (teal): jagged but net flat — wobbles around the same band -->\n        <polyline fill=\"none\" stroke=\"#1f93ad\" stroke-width=\"2.4\"\n          points=\"90,58 195,70 300,52 405,66 510,56 615,68 700,60\"/>\n        <!-- Calibration Drift (red): climbing with real kinks, not a clean ramp -->\n        <polyline fill=\"none\" stroke=\"#cf4848\" stroke-width=\"2.4\"\n          points=\"90,168 195,150 300,158 405,132 510,138 615,116 700,108\"/>\n      <\/svg>\n      <!-- axis + annotations as HTML overlay (true proportions, no stretch) -->\n      <span class=\"cx\" style=\"left:12.5%;top:220px\">Apr 21<\/span>\n      <span class=\"cx\" style=\"left:27.08%;top:220px\">Apr 28<\/span>\n      <span class=\"cx\" style=\"left:41.67%;top:220px\">May 5<\/span>\n      <span class=\"cx\" style=\"left:56.25%;top:220px\">May 12<\/span>\n      <span class=\"cx\" style=\"left:70.83%;top:220px\">May 19<\/span>\n      <span class=\"cx\" style=\"left:85.42%;top:220px\">May 26<\/span>\n      <span class=\"cx end\" style=\"left:97.22%;top:220px\">Jun 2–8<\/span>\n      <span class=\"cdot\" style=\"left:97.22%;top:108px;background:#cf4848\"><\/span>\n      <span class=\"cdot\" style=\"left:97.22%;top:60px;background:#1f93ad\"><\/span>\n      <span class=\"cann\" style=\"left:94%;top:124px;color:#cf4848\">drift rising<\/span>\n      <span class=\"cann\" style=\"left:94%;top:26px;color:#1f93ad\">downstream flat<\/span>\n      <div class=\"charttip\" id=\"charttip\"><\/div>\n      <\/div>\n      <div class=\"legend\">\n        <span><i style=\"background:var(--orange)\"><\/i>Approval Rate<\/span>\n        <span><i style=\"background:var(--teal)\"><\/i>Downstream Verification (affected accounts)<\/span>\n        <span><i style=\"background:var(--red)\"><\/i>Calibration Drift<\/span>\n      <\/div>\n      <div class=\"read\">Over seven weeks approval has slipped and drift has climbed — but the two lines do not move together cleanly, and downstream verification on the affected accounts barely moves. That gap is the thing to read carefully: drift may be a healthy early-warning, or a sign the metric itself is off. S4.2 tightens the gate as a reversible precaution; the audit then confirms whether to keep that tightening or release it — the number alone isn't proof.<\/div>\n    <\/div>\n\n    <!-- READING ORDER 2: topic-level drift watch — audit table, deliberately NOT action cards -->\n    <div class=\"topics\">\n      <h3>Calibration by topic — where calibration is starting to slip<\/h3>\n      <div class=\"cap\">Drift = movement away from your Fin Operator's calibrated accuracy on the topic, over the 7-week window.<\/div>\n      <div class=\"frame\">This weekly read isn't a to-do list — for each drifting topic you either <b>order a human audit<\/b>, or let <b>S4.2's automatic tightening<\/b> stand.<\/div>\n      <table>\n        <thead>\n          <tr>\n            <th>Topic<\/th>\n            <th>Proposals (4 wk)<\/th>\n            <th style=\"text-align:right\">Drift<\/th>\n            <th style=\"text-align:right\">Downstream verif.<\/th>\n            <th>Suggested<\/th>\n          <\/tr>\n        <\/thead>\n        <tbody>\n          <tr>\n            <td>FCA §4.2 refund re-routing\n              <div class=\"autobadge\"><span class=\"d\"><\/span>S4.2 already auto-tightened this topic's gate · deterministic · logged to Policy Log<\/div>\n            <\/td>\n            <td class=\"num\">214<\/td>\n            <td class=\"num\"><span class=\"drift hi\">+4.2pp ▲<\/span><\/td>\n            <td class=\"num\">81.3%<\/td>\n            <td style=\"white-space:nowrap\"><button class=\"auditbtn\" data-audit=\"FCA §4.2 refund re-routing\">Order manual audit<\/button><span class=\"ai\">i<span class=\"aitip\"><span class=\"ttl\">Manual audit<\/span>Dispatches this topic to a CSM Lead (SLA 24h). They review the affected accounts, the recent Operator proposals and whether each held after shipping, plus a sample of real conversations — then mark the drift real or a false alarm. Logged to the Policy Log.<\/span><\/span><\/td>\n          <\/tr>\n          <tr>\n            <td>Billing dispute escalation<\/td>\n            <td class=\"num\">98<\/td>\n            <td class=\"num\"><span class=\"drift mid\">+2.6pp ▲<\/span><\/td>\n            <td class=\"num\">79.1%<\/td>\n            <td style=\"white-space:nowrap\"><button class=\"auditbtn\" data-audit=\"Billing dispute escalation\">Order manual audit<\/button><span class=\"ai\">i<span class=\"aitip\"><span class=\"ttl\">Manual audit<\/span>Dispatches this topic to a CSM Lead (SLA 24h). They review the affected accounts, the recent Operator proposals and whether each held after shipping, plus a sample of real conversations — then mark the drift real or a false alarm. Logged to the Policy Log.<\/span><\/span><\/td>\n          <\/tr>\n          <tr>\n            <td>SLA breach acknowledgement<\/td>\n            <td class=\"num\">141<\/td>\n            <td class=\"num\"><span class=\"drift lo\">+0.4pp<\/span><\/td>\n            <td class=\"num\">88.7%<\/td>\n            <td><span class=\"tagpill ok\">Holding<\/span><\/td>\n          <\/tr>\n          <tr>\n            <td>Account closure handling<\/td>\n            <td class=\"num\">63<\/td>\n            <td class=\"num\"><span class=\"drift lo\">−0.9pp ▼<\/span><\/td>\n            <td class=\"num\">90.2%<\/td>\n            <td><span class=\"tagpill ok\">Holding<\/span><\/td>\n          <\/tr>\n        <\/tbody>\n      <\/table>\n    <\/div>\n\n    <!-- A-3 路1: quiet, always-on reverse reference — S2 acceptance trend + S1 coverage feeding in -->\n    <div class=\"back\">\n      <span class=\"tag\">Fed in from S2 + S1<\/span>\n      <span>\n        <b>S2 Proposal Review (acceptance trend):<\/b> Fin Operator approval acceptance 69.6% → 68.4% over 7 weeks, trending down 1.2pp · 312 proposals reviewed.\n        &nbsp;·&nbsp;\n        <b>S1 At-Risk coverage:<\/b> 7 of the affected §4.2 accounts were flagged at-risk this month; 6 entered the Operator RCA pipeline. <em>This is the upstream context this calibration is auditing.<\/em>\n      <\/span>\n    <\/div>\n\n  <\/main>\n<\/div>\n<script>\n  // collapsible icon sidebar (shared across the 5 prototype pages via satp_nav)\n  (function(){\n    var side=document.getElementById('side'), btn=document.getElementById('collapseBtn');\n    if(!side||!btn) return;\n    function apply(c){ side.classList.toggle('collapsed',c); btn.title=c?'Expand sidebar':'Collapse sidebar'; }\n    var saved; try{saved=localStorage.getItem('satp_nav')}catch(e){}\n    apply(saved==='collapsed');\n    btn.addEventListener('click',function(){\n      var c=!side.classList.contains('collapsed'); apply(c);\n      try{localStorage.setItem('satp_nav',c?'collapsed':'expanded')}catch(e){}\n    });\n  })();\n<\/script>\n<script>\n(function(){\n  // ---- TASK 1: HTML overlay data points + shared tooltip over the (stretched) SVG ----\n  var X = [90,195,300,405,510,615,700];\n  var SERIES = [\n    {name:\"Approval Rate\", color:\"#ff5c28\",\n     y:[72,60,96,78,70,104,88], v:[\"69.6%\",\"70.4%\",\"67.8%\",\"69.1%\",\"69.8%\",\"67.2%\",\"68.4%\"]},\n    {name:\"Downstream Verification\", color:\"#1f93ad\",\n     y:[58,70,52,66,56,68,60], v:[\"81.8%\",\"81.0%\",\"82.1%\",\"81.2%\",\"81.6%\",\"80.9%\",\"81.3%\"]},\n    {name:\"Calibration Drift\", color:\"#cf4848\",\n     y:[168,150,158,132,138,116,108], v:[\"+1.0pp\",\"+1.8pp\",\"+1.5pp\",\"+2.7pp\",\"+2.5pp\",\"+3.6pp\",\"+4.2pp\"]}\n  ];\n  var LABELS = [\"Apr 21\",\"Apr 28\",\"May 5\",\"May 12\",\"May 19\",\"May 26\",\"Jun 2–8\"];\n  var wrap = document.getElementById('chartwrap');\n  var tip = document.getElementById('charttip');\n  if(wrap && tip){\n    // one vertical guide + one highlight dot per line, created once\n    var guide = document.createElement('span'); guide.className='guide'; wrap.appendChild(guide);\n    var hdots = SERIES.map(function(s){ var d=document.createElement('span'); d.className='hdot'; d.style.background=s.color; wrap.appendChild(d); return d; });\n    function showCol(i){\n      var leftPct = X[i]/720*100;\n      guide.style.left = leftPct+'%'; guide.style.opacity = 1;\n      SERIES.forEach(function(s,k){ hdots[k].style.left=leftPct+'%'; hdots[k].style.top=s.y[i]+'px'; hdots[k].style.opacity=1; });\n      var rows = SERIES.map(function(s){\n        return '<div class=\"row\"><span class=\"sw\" style=\"background:'+s.color+'\"><\/span>'+s.name+'<span class=\"vv\">'+s.v[i]+'<\/span><\/div>';\n      }).join('');\n      tip.innerHTML = '<div class=\"ttl\">Week of '+LABELS[i]+'<\/div>'+rows;\n      tip.style.left = Math.max(16, Math.min(84, leftPct))+'%';   // clamp so the box stays on-canvas\n      tip.classList.add('on');\n    }\n    function hideCol(){ guide.style.opacity=0; hdots.forEach(function(d){d.style.opacity=0;}); tip.classList.remove('on'); }\n    wrap.addEventListener('mousemove', function(e){\n      var r = wrap.getBoundingClientRect();\n      var px = (e.clientX - r.left)/r.width*720;            // cursor → viewBox x\n      var i=0, best=1e9; X.forEach(function(x,k){ var d=Math.abs(x-px); if(d<best){best=d;i=k;} });\n      showCol(i);                                           // snap to nearest weekly reading\n    });\n    wrap.addEventListener('mouseleave', hideCol);\n  }\n\n  // ---- TASK 2: delegated click for audit-order + metric-flag actions ----\n  document.addEventListener('click', function(e){\n    var ab = e.target.closest && e.target.closest('.auditbtn');\n    if(ab && !ab.disabled){\n      var topic = ab.getAttribute('data-audit') || 'this topic';\n      var done = document.createElement('span');\n      done.className = 'auditdone';\n      done.textContent = '✓ Audit dispatched · logged';\n      ab.replaceWith(done);\n      return;\n    }\n  });\n})();\n<\/script>\n<script>(function(){var TITLE={\"Setup & Config\":\"setup\",\"At-Risk Interactions\":\"atrisk\",\"Proposal Review\":\"proposal\",\"Calibration Status\":\"calibration\",\"Policy Execution Log\":\"policylog\"};var FILE={\"Step1_Setup_v2.html\":\"setup\",\"Step2_AtRisk_v2.html\":\"atrisk\",\"Step3_ProposalReview_v2.html\":\"proposal\",\"Step5_Calibration_v2.html\":\"calibration\",\"S4_PolicyLog_v2.html\":\"policylog\",\"00_Start_Here_Tour.html\":\"tour\"};document.addEventListener('click',function(e){var a=e.target.closest&&e.target.closest('a');if(!a)return;var k=TITLE[(a.getAttribute('title')||'').trim()]||FILE[a.getAttribute('href')];if(k){e.preventDefault();try{parent.postMessage({satpGo:k},'*');}catch(_){}}},true);})();<\/script><\/body>\n<\/html>\n", "policylog": "<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>Policy Execution Log — Stacked Agent Trust Protocol (Fin Operator style)<\/title>\n<link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n<link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin>\n<link href=\"https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,500;6..72,600&display=swap\" rel=\"stylesheet\">\n<style>\n  :root{\n    /* Fin Operator product UI: warm off-white, serif headlines, sparing orange→coral accent */\n    --bg:#fbfcfd; --panel:#ffffff; --panel-2:#f3f5f7; --raised:#eaedf1;\n    --ink:#161a1f; --text:#363b43; --muted:#646b75; --faint:#969ca6;\n    --line:#e2e6eb; --line-2:#edf0f3;\n    --orange:#ff5c28; --coral:#ff8a5b; --orange-soft:#fdeee6; --orange-line:#f6cdb8;\n    --grad:linear-gradient(135deg,#ff5c28,#ff8a5b);\n    --black:#1b1813;\n    --red:#cf4848; --red-soft:#fbeceb; --red-line:#f1cdca;\n    --amber:#a9761c; --amber-soft:#fbf3e3; --amber-line:#eccf9b;\n    --teal:#1f93ad; --green:#3f9e6a; --violet:#6d5bd0;\n    --s1:#ff7a45; --s2:#1f93ad; --s3:#3f9e6a; --s4:#6d5bd0;\n    --s4-soft:#efedfa; --s4-line:#d8d2f1;\n    --serif:\"Newsreader\",\"Iowan Old Style\",\"Palatino Linotype\",Palatino,Georgia,\"Times New Roman\",serif;\n    --mono:\"SF Mono\",ui-monospace,Menlo,Monaco,\"Cascadia Mono\",\"Roboto Mono\",Consolas,monospace;\n    --radius:14px;\n  }\n  *{box-sizing:border-box;margin:0;padding:0}\n  body{font-family:-apple-system,BlinkMacSystemFont,\"Segoe UI\",Inter,Roboto,Helvetica,Arial,sans-serif;\n    background:var(--bg);color:var(--text);line-height:1.5;-webkit-font-smoothing:antialiased}\n  .app{display:flex;height:100vh;overflow:hidden}\n\n  /* sidebar — light, airy, with a thin violet brand edge */\n  .side{width:256px;flex-shrink:0;background:var(--panel-2);border-right:1px solid var(--line);\n    display:flex;flex-direction:column;padding:22px 0;position:relative;transition:width .18s;overflow-y:auto}\n  .side:before{content:\"\";position:absolute;left:0;top:0;bottom:0;width:3px;\n    background:linear-gradient(180deg,#6d5bd0,#ff8a5b)}\n  .brand{padding:2px 24px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:11px}\n  .brand .mark{width:28px;height:28px;flex-shrink:0;display:flex;align-items:center;justify-content:center;line-height:0}\n  .brand .btxt{min-width:0}\n  .brand .name{font-family:var(--serif);font-size:16px;font-weight:600;letter-spacing:.01em;color:var(--ink)}\n  .brand .sub{font-size:11px;color:var(--faint);margin-top:4px}\n  .collapse-btn{margin-left:auto;flex-shrink:0;background:none;border:none;border-radius:7px;cursor:pointer;padding:4px;line-height:0;transition:.15s}\n  .collapse-btn:hover{background:var(--panel)}\n  .collapse-btn .cicon{width:18px;height:18px;display:block;opacity:.62;transition:opacity .15s}\n  .collapse-btn:hover .cicon{opacity:1}\n  .nav{padding:16px 12px;display:flex;flex-direction:column;gap:2px}\n  .nav .lbl{font-size:10px;letter-spacing:.12em;color:var(--faint);padding:8px 12px 5px;text-transform:uppercase}\n  .nav a{display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:9px;color:var(--muted);\n    text-decoration:none;font-size:13px;transition:.15s}\n  .nav a:hover{background:#fff;color:var(--text)}\n  .nav a.active{background:#fff;color:var(--ink);font-weight:600;box-shadow:0 1px 2px rgba(27,24,19,.05),inset 0 0 0 1px var(--line)}\n  .nav a .nico{width:18px;height:18px;flex-shrink:0;display:block}\n  .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}\n  .side .foot{margin-top:auto;padding:16px 24px;border-top:1px solid var(--line);font-size:11px;color:var(--faint);display:flex;align-items:center;gap:10px}\n  .side .foot b{color:var(--text)}\n  .avatar{width:28px;height:28px;border-radius:50%;flex-shrink:0;position:relative;background:linear-gradient(135deg,#6d5bd0,#ff8a5b);display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700;letter-spacing:.02em}\n  .avatar .presence{position:absolute;right:-1px;bottom:-1px;width:9px;height:9px;border-radius:50%;background:var(--green);border:2px solid var(--panel-2)}\n  .status{display:flex;align-items:center;gap:7px;padding:12px 24px 0;font-size:11px;color:var(--muted)}\n  .status .sdot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 0 3px rgba(63,158,106,.15)}\n  .tenet{margin-top:8px;font-size:11px;color:var(--faint);font-style:italic}\n\n  /* collapsed icon rail */\n  .side.collapsed{width:64px}\n  .side.collapsed .brand{flex-direction:column;align-items:center;gap:12px;padding:16px 0;justify-content:center;position:static}\n  .side.collapsed .brand .btxt{display:none}\n  .side.collapsed .collapse-btn{position:static;margin:0}\n  .side.collapsed .nav{padding:16px 8px}\n  .side.collapsed .nav .lbl{display:none}\n  .side.collapsed .nav a{justify-content:center;gap:0;padding:9px 0}\n  .side.collapsed .nav a .ntxt{display:none}\n  .side.collapsed .nav a .dot{display:none}\n  .side.collapsed .status{padding:12px 0 0;justify-content:center}\n  .side.collapsed .status .stxt{display:none}\n  .side.collapsed .foot{justify-content:center;padding:16px 8px}\n  .side.collapsed .foot .ftxt{display:none}\n\n  .main{flex:1;overflow-y:auto;padding:30px 40px 64px;max-width:1080px}\n  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}\n  .crumb{font-size:12px;color:var(--muted)} .crumb b{color:var(--text)}\n\n  /* time-scale marker (C-2): deterministic response, NOT in-flow gate (C-1) — violet S4 family */\n  .scaletag{display:inline-flex;align-items:center;gap:8px;font-size:12px;font-weight:600;padding:6px 13px;\n    border-radius:999px;background:var(--s4-soft);color:#4a3f8a;border:1px solid var(--s4-line)}\n\n  h1{font-family:var(--serif);font-size:27px;font-weight:600;color:var(--ink);letter-spacing:-.01em;line-height:1.25;margin-bottom:7px}\n  .lead{font-size:13.5px;color:var(--muted);margin-bottom:22px}.lead b{color:var(--text)}\n\n  /* 2-a discipline statement: deterministic, no AI judgment — violet S4 left edge */\n  .discipline{display:flex;gap:13px;align-items:flex-start;background:var(--panel);border:1px solid var(--line);\n    border-left:3px solid var(--s4);border-radius:0 12px 12px 0;padding:14px 17px;margin-bottom:18px;box-shadow:0 1px 2px rgba(27,24,19,.03)}\n  .discipline .ic{color:var(--s4);font-size:14px;line-height:1.3}\n  .discipline .t{font-size:13px;color:var(--text)}.discipline b{color:var(--ink)}\n\n  /* read-only banner — no actions here */\n  .robar{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:14px}\n  .roleft{display:flex;align-items:center;gap:10px}\n  .ro{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:600;color:var(--muted);\n    background:var(--panel-2);border:1px solid var(--line);border-radius:999px;padding:4px 11px}\n  .legend{display:flex;align-items:center;gap:14px;font-size:11.5px;color:var(--faint)}\n  .legend span{display:inline-flex;align-items:center;gap:6px}\n  .ltag{font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:2px 8px;border-radius:5px}\n  .ltag.imm{background:var(--orange-soft);color:#c2521f;border:1px solid var(--orange-line)}\n  .ltag.post{background:var(--s4-soft);color:#4a3f8a;border:1px solid var(--s4-line)}\n\n  /* ---------- THE LEDGER: row-based, timestamped, read-only flow record (visually distinct from S3 trend curves) ---------- */\n  .ledger{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;\n    box-shadow:0 1px 2px rgba(27,24,19,.03)}\n  .lhead{display:grid;grid-template-columns:128px 30px 1fr 30px 1fr;gap:0;padding:11px 22px;\n    background:var(--panel-2);border-bottom:1px solid var(--line);font-size:10.5px;letter-spacing:.07em;\n    text-transform:uppercase;color:var(--faint);font-weight:700}\n  .lhead .arrowcol{text-align:center}\n  .entry{display:grid;grid-template-columns:128px 30px 1fr 30px 1fr;gap:0;padding:16px 22px;\n    border-top:1px solid var(--line-2);align-items:start;font-size:13px}\n  .entry:first-child{border-top:none}\n  .entry:hover{background:var(--panel-2)}\n\n  .ts{display:flex;flex-direction:column;gap:6px}\n  .ts .time{font-family:var(--serif);font-size:15px;font-weight:600;color:var(--ink);font-variant-numeric:tabular-nums}\n  .ts .date{font-size:11px;color:var(--faint)}\n  .ts .tag{align-self:flex-start;font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;\n    padding:2px 8px;border-radius:5px;margin-top:2px}\n  .ts .tag.imm{background:var(--orange-soft);color:#c2521f;border:1px solid var(--orange-line)}\n  .ts .tag.post{background:var(--s4-soft);color:#4a3f8a;border:1px solid var(--s4-line)}\n  .ts .src{font-size:10.5px;color:var(--faint);font-weight:600;letter-spacing:.02em}\n\n  .arrowcol{text-align:center;color:var(--faint);font-size:15px;padding-top:1px;line-height:1.4}\n\n  .col .klab{font-size:10px;letter-spacing:.07em;text-transform:uppercase;color:var(--faint);font-weight:700;margin-bottom:6px}\n  /* trigger = the rule/threshold crossed, shown as a Fin-style code block (light grey rounded mono) */\n  .trig{color:var(--text);line-height:1.6}\n  .trig b{color:var(--ink)}\n  .code{display:block;font-family:var(--mono);font-size:11.5px;color:var(--ink window.addEventListener('message',function(e){if(e.data&&e.data.satpGo)go(e.data.satpGo);});
tourBtn.addEventListener('click',function(){go(currentKey==='tour'?lastSurface:'tour');});go('atrisk');
</script></body></html>
